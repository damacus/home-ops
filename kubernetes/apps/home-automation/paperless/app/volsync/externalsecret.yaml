---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-restic-local
  namespace: home-automation
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: paperless-restic-local
    template:
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: "s3:http://rustfs.storage.svc.cluster.local:9000/volsync-backups/paperless"
        RESTIC_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .username }}"
        AWS_SECRET_ACCESS_KEY: "{{ .password }}"
  data:
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: volsync
        property: RESTIC_PASSWORD
    - secretKey: username
      remoteRef:
        key: rustfs
        property: username
    - secretKey: password
      remoteRef:
        key: rustfs
        property: password
---
# Keep the old paperless-restic-local secret above for rollback while the
# active VolSync consumer uses this per-app RustFS credential.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustfs-paperless
  namespace: home-automation
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: rustfs-paperless
    template:
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: "s3:http://rustfs.storage.svc.cluster.local:9000/volsync-paperless"
        RESTIC_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .username }}"
        AWS_SECRET_ACCESS_KEY: "{{ .password }}"
  data:
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: volsync
        property: RESTIC_PASSWORD
    - secretKey: username
      remoteRef:
        key: rustfs-paperless
        property: username
    - secretKey: password
      remoteRef:
        key: rustfs-paperless
        property: password
