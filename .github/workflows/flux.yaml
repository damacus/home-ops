---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "YAML, Flate & Mondoo"

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
      - name: Run yamllint
        uses: actionshub/yamllint@main

  yayamlls:
    name: Yayamlls
    needs: yaml-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup yayamlls
        uses: home-operations/yayamlls/action@0.1.11
        with:
          token: ${{ github.token }}

      - name: Run yayamlls rendered validation
        run: yayamlls validate --render ./kubernetes

  mondoo:
    name: Mondoo
    needs: [yaml-lint, yayamlls, flate-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Setup flate
        uses: home-operations/flate/action@v0.4.10
        with:
          base: ""
          token: ${{ github.token }}
          cache: "true"

      - name: Setup Workflow Tools
        run: |
          brew install yq
          bash -c "$(curl -sSL https://install.mondoo.com/sh)"
          cnspec version

      - name: Run wrapper unit tests
        run: python3 -m unittest tests/test_mondoo_scan.py

      - name: Validate migrated policy parity
        run: python3 scripts/mondoo_scan.py validate-parity

      - name: Lint Mondoo policies
        run: cnspec policy lint mondoo/policies/*.mql.yaml

      - name: Run rendered manifest scans
        env:
          FLATE_BASE: ""
        run: >-
          python3 scripts/mondoo_scan.py
          --output junit
          --report-dir mondoo-reports
          k8s-manifests --path ./kubernetes --include-posture

      - name: Upload Mondoo reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mondoo-reports
          path: mondoo-reports
          if-no-files-found: ignore

  rustfs-iam-policy:
    name: RustFS IAM Policy
    needs: yaml-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Setup Workflow Tools
        run: |
          bash -c "$(curl -sSL https://install.mondoo.com/sh)"
          brew tap go-task/tap
          brew install go-task/tap/go-task
          cnspec providers install os

      - name: Run RustFS IAM policy
        run: task k8s:rustfs-iam-policy

  flate-test:
    name: Flate Test
    needs: [yaml-lint, yayamlls, rustfs-iam-policy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup flate
        uses: home-operations/flate/action@v0.4.10
        with:
          base: ""
          token: ${{ github.token }}
          cache: "true"

      - name: Run flate test
        env:
          FLATE_BASE: ""
        run: >-
          flate --no-progress test all
          --api-versions "policy/v1/PodDisruptionBudget,monitoring.coreos.com/v1,monitoring.coreos.com/v1/ServiceMonitor,monitoring.coreos.com/v1/PodMonitor,monitoring.coreos.com/v1/PrometheusRule"
          --path ./kubernetes

  flate-diff:
    name: Flate Diff
    needs: [yaml-lint, yayamlls, rustfs-iam-policy]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup flate
        uses: home-operations/flate/action@v0.4.10
        with:
          base: ""
          token: ${{ github.token }}
          cache: "true"

      - name: Fetch PR Base
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "+${BASE_SHA}:refs/remotes/origin/pr-base"
          git rev-parse --verify "refs/remotes/origin/pr-base^{commit}"

      - name: Run flate diff
        id: diff
        shell: bash
        env:
          FLATE_BASE: origin/pr-base
        run: |
          set -euo pipefail
          flate --no-progress diff all \
            --api-versions "policy/v1/PodDisruptionBudget,monitoring.coreos.com/v1,monitoring.coreos.com/v1/ServiceMonitor,monitoring.coreos.com/v1/PodMonitor,monitoring.coreos.com/v1/PrometheusRule" \
            --path ./kubernetes \
            -o github > flate.diff
          if [[ -s flate.diff ]]; then
            {
              echo '`````diff'
              cat flate.diff
              echo '`````'
            } > flate-comment.md
            echo 'has_diff=true' >> "$GITHUB_OUTPUT"
          else
            echo 'has_diff=false' >> "$GITHUB_OUTPUT"
          fi

      - name: PR Comment
        uses: mshick/add-pr-comment@v3
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          message-failure: Unable to post flate diff
          message-path: flate-comment.md

  flate-success:
    if: ${{ always() }}
    needs: ["flate-diff", "flate-test", "mondoo"]
    name: Flate Successful
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        name: Check matrix status
        run: exit 1
