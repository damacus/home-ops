---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      main:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: rustfs/rustfs
              tag: 1.0.0-alpha.90
            env:
              TZ: "${TZ}"
              RUSTFS_VOLUMES: /data
              RUSTFS_ADDRESS: :9000
              RUSTFS_CONSOLE_ADDRESS: :9001
            envFrom:
              - secretRef:
                  name: rustfs-credentials
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /minio/health/live
                    port: 9000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 2Gi

    service:
      main:
        controller: main
        ports:
          http:
            port: 9001
          api:
            port: 9000

    route:
      console:
        hostnames: ["rustfs.ironstone.casa"]
        parentRefs:
          - name: traefik-internal
            namespace: network
            sectionName: websecure
        rules:
          - backendRefs:
              - name: rustfs
                port: 9001
      s3:
        hostnames: ["rustfs-s3.ironstone.casa"]
        parentRefs:
          - name: traefik-internal
            namespace: network
            sectionName: websecure
        rules:
          - backendRefs:
              - name: rustfs
                port: 9000

    persistence:
      data:
        existingClaim: rustfs-data
        globalMounts:
          - path: /data
