---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Before deploying, create a "rustfs" item in 1Password with:
#   username: the S3 access key ID   (choose freely, e.g. "rustfsadmin")
#   password: the S3 secret key      (generate a strong random string, min 8 chars)
#
# These are the admin credentials any S3 client uses to authenticate to RustFS.
# They are equivalent to MinIO's MINIO_ROOT_USER / MINIO_ROOT_PASSWORD.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name rustfs-credentials
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        RUSTFS_ACCESS_KEY: "{{ .username }}"
        RUSTFS_SECRET_KEY: "{{ .password }}"
        ACCESS_KEY_ID: "{{ .username }}"
        SECRET_ACCESS_KEY: "{{ .password }}"
        aws-access-key-id: "{{ .username }}"
        aws-secret-access-key: "{{ .password }}"
  dataFrom:
    - extract:
        key: rustfs
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustfs-cnpg-credentials
  namespace: storage
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: rustfs-cnpg-credentials
    template:
      engineVersion: v2
      metadata:
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "authentication,dev,home,home-automation"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "authentication,dev,home,home-automation"
      data:
        ACCESS_KEY_ID: "{{ .username }}"
        SECRET_ACCESS_KEY: "{{ .password }}"
  dataFrom:
    - extract:
        key: rustfs
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustfs-app-credentials
  namespace: storage
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: rustfs-app-credentials
    template:
      engineVersion: v2
      data:
        RUSTFS_CNPG_ZITADEL_ACCESS_KEY: "{{ .rustfs_cnpg_zitadel_username }}"
        RUSTFS_CNPG_ZITADEL_SECRET_KEY: "{{ .rustfs_cnpg_zitadel_password }}"
        RUSTFS_CNPG_FORGEJO_ACCESS_KEY: "{{ .rustfs_cnpg_forgejo_username }}"
        RUSTFS_CNPG_FORGEJO_SECRET_KEY: "{{ .rustfs_cnpg_forgejo_password }}"
        RUSTFS_CNPG_HOME_ASSISTANT_ACCESS_KEY: "{{ .rustfs_cnpg_home_assistant_username }}"
        RUSTFS_CNPG_HOME_ASSISTANT_SECRET_KEY: "{{ .rustfs_cnpg_home_assistant_password }}"
        RUSTFS_CNPG_N8N_ACCESS_KEY: "{{ .rustfs_cnpg_n8n_username }}"
        RUSTFS_CNPG_N8N_SECRET_KEY: "{{ .rustfs_cnpg_n8n_password }}"
        RUSTFS_CNPG_IMMICH_ACCESS_KEY: "{{ .rustfs_cnpg_immich_username }}"
        RUSTFS_CNPG_IMMICH_SECRET_KEY: "{{ .rustfs_cnpg_immich_password }}"
        RUSTFS_CNPG_MEALIE_ACCESS_KEY: "{{ .rustfs_cnpg_mealie_username }}"
        RUSTFS_CNPG_MEALIE_SECRET_KEY: "{{ .rustfs_cnpg_mealie_password }}"
        RUSTFS_CNPG_MED_TRACKER_ACCESS_KEY: "{{ .rustfs_cnpg_med_tracker_username }}"
        RUSTFS_CNPG_MED_TRACKER_SECRET_KEY: "{{ .rustfs_cnpg_med_tracker_password }}"
        RUSTFS_CNPG_PENPOT_ACCESS_KEY: "{{ .rustfs_cnpg_penpot_username }}"
        RUSTFS_CNPG_PENPOT_SECRET_KEY: "{{ .rustfs_cnpg_penpot_password }}"
        RUSTFS_LONGHORN_ACCESS_KEY: "{{ .rustfs_longhorn_username }}"
        RUSTFS_LONGHORN_SECRET_KEY: "{{ .rustfs_longhorn_password }}"
        RUSTFS_PAPERLESS_ACCESS_KEY: "{{ .rustfs_paperless_username }}"
        RUSTFS_PAPERLESS_SECRET_KEY: "{{ .rustfs_paperless_password }}"
        RUSTFS_LOKI_ACCESS_KEY: "{{ .rustfs_loki_username }}"
        RUSTFS_LOKI_SECRET_KEY: "{{ .rustfs_loki_password }}"
  data:
    - secretKey: rustfs_cnpg_zitadel_username
      remoteRef:
        key: rustfs-cnpg-zitadel
        property: username
    - secretKey: rustfs_cnpg_zitadel_password
      remoteRef:
        key: rustfs-cnpg-zitadel
        property: password
    - secretKey: rustfs_cnpg_forgejo_username
      remoteRef:
        key: rustfs-cnpg-forgejo
        property: username
    - secretKey: rustfs_cnpg_forgejo_password
      remoteRef:
        key: rustfs-cnpg-forgejo
        property: password
    - secretKey: rustfs_cnpg_home_assistant_username
      remoteRef:
        key: rustfs-cnpg-home-assistant
        property: username
    - secretKey: rustfs_cnpg_home_assistant_password
      remoteRef:
        key: rustfs-cnpg-home-assistant
        property: password
    - secretKey: rustfs_cnpg_n8n_username
      remoteRef:
        key: rustfs-cnpg-n8n
        property: username
    - secretKey: rustfs_cnpg_n8n_password
      remoteRef:
        key: rustfs-cnpg-n8n
        property: password
    - secretKey: rustfs_cnpg_immich_username
      remoteRef:
        key: rustfs-cnpg-immich
        property: username
    - secretKey: rustfs_cnpg_immich_password
      remoteRef:
        key: rustfs-cnpg-immich
        property: password
    - secretKey: rustfs_cnpg_mealie_username
      remoteRef:
        key: rustfs-cnpg-mealie
        property: username
    - secretKey: rustfs_cnpg_mealie_password
      remoteRef:
        key: rustfs-cnpg-mealie
        property: password
    - secretKey: rustfs_cnpg_med_tracker_username
      remoteRef:
        key: rustfs-cnpg-med-tracker
        property: username
    - secretKey: rustfs_cnpg_med_tracker_password
      remoteRef:
        key: rustfs-cnpg-med-tracker
        property: password
    - secretKey: rustfs_cnpg_penpot_username
      remoteRef:
        key: rustfs-cnpg-penpot
        property: username
    - secretKey: rustfs_cnpg_penpot_password
      remoteRef:
        key: rustfs-cnpg-penpot
        property: password
    - secretKey: rustfs_longhorn_username
      remoteRef:
        key: rustfs-longhorn
        property: username
    - secretKey: rustfs_longhorn_password
      remoteRef:
        key: rustfs-longhorn
        property: password
    - secretKey: rustfs_paperless_username
      remoteRef:
        key: rustfs-paperless
        property: username
    - secretKey: rustfs_paperless_password
      remoteRef:
        key: rustfs-paperless
        property: password
    - secretKey: rustfs_loki_username
      remoteRef:
        key: rustfs-loki
        property: username
    - secretKey: rustfs_loki_password
      remoteRef:
        key: rustfs-loki
        property: password
