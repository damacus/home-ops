---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app grafana
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      imagePullSecrets:
        - dockerhub-credentials
    image:
      pullSecrets:
        - dockerhub-credentials

    replicas: 1
    podAnnotations:
      reloader.stakater.com/auto: "true"
    env:
      GF_DATE_FORMATS_USE_BROWSER_LOCALE: true
      GF_EXPLORE_ENABLED: true
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_PLUGINS_PREINSTALL_SYNC: grafana-oncall-app
      GF_SECURITY_COOKIE_SAMESITE: grafana
      GF_SERVER_ROOT_URL: https://grafana.ironstone.casa
    envFromSecrets:
      - name: zitadel-grafana-oidc
      - name: grafana-oncall-secret
    # envValueFrom:
    #   GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
    #     secretKeyRef:
    #       name: zitadel-grafana-oidc
    #       key: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
    #   GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
    #     secretKeyRef:
    #       name: zitadel-grafana-oidc
    #       key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET

    grafana.ini:
      analytics:
        check_for_updates: false
        check_for_plugin_updates: false
        reporting_enabled: false
      auth:
        disable_login_form: false
      auth.generic_oauth:
        enabled: true
        name: Zitadel
        allow_sign_up: true
        client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
        client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
        scopes: openid profile email groups
        auth_url: https://zitadel.damacus.io/oauth/v2/authorize
        token_url: https://zitadel.damacus.io/oauth/v2/token
        api_url: https://zitadel.damacus.io/oidc/v1/userinfo
        login_attribute_path: email
        name_attribute_path: name
        role_attribute_path: contains(groups[*], 'admin') && 'Admin' || 'Viewer'
        use_pkce: true
        tls_skip_verify_insecure: false

    deploymentStrategy:
      type: RollingUpdate

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    admin:
      existingSecret: grafana-secret
      passwordKey: admin-password
      userKey: admin-user

    alerting:
      contactpoints.yaml:
        apiVersion: 1
        contactPoints:
          - orgId: 1
            name: Alertmanager
            receivers:
              - uid: alertmanager
                type: prometheus-alertmanager
                settings:
                  url: http://vmalertmanager-vm.monitoring.svc.cluster.local:9093
      policies.yaml:
        apiVersion: 1
        policies:
          - orgId: 1
            receiver: Alertmanager
            group_by:
              - grafana_folder
              - alertname
            group_wait: 1m
            group_interval: 10m
            repeat_interval: 12h
      rules.yaml:
        apiVersion: 1
        groups:
          - orgId: 1
            name: recurring-health
            folder: Kubernetes
            interval: 1m
            rules:
              - uid: cnpg-last-successful-backup-stale
                title: CNPG last successful backup is stale
                condition: C
                data:
                  - refId: A
                    datasourceUid: prometheus
                    relativeTimeRange:
                      from: 600
                      to: 0
                    model:
                      datasource:
                        type: prometheus
                        uid: prometheus
                      editorMode: code
                      expr: |-
                        (
                          min by (namespace, job) (
                            time() - barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{
                              job!~"dev/forgejo-green|home-automation/(home-assistant-green|n8n-green)"
                            }
                          ) > 108000
                        )
                        or
                        (
                          min by (namespace, job) (
                            time() - barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{
                              job=~"dev/forgejo-green|home-automation/(home-assistant-green|n8n-green)"
                            }
                          ) > 129600
                        )
                      instant: true
                      intervalMs: 1000
                      maxDataPoints: 43200
                      refId: A
                  - refId: B
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: A
                      reducer: max
                      refId: B
                      type: reduce
                  - refId: C
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      conditions:
                        - evaluator:
                            params:
                              - 0
                            type: gt
                          operator:
                            type: and
                          query:
                            params:
                              - C
                          reducer:
                            params: []
                            type: last
                          type: query
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: B
                      refId: C
                      type: threshold
                noDataState: NoData
                execErrState: Alerting
                for: 15m
                annotations:
                  summary: CNPG backup age exceeds expected schedule
                  description: A CNPG cluster has no recent successful Barman backup for its schedule.
                labels:
                  severity: critical
              - uid: cnpg-recent-backup-failed
                title: CNPG backup failed recently
                condition: C
                data:
                  - refId: A
                    datasourceUid: prometheus
                    relativeTimeRange:
                      from: 600
                      to: 0
                    model:
                      datasource:
                        type: prometheus
                        uid: prometheus
                      editorMode: code
                      expr: |-
                        (
                          max by (namespace, job) (barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp)
                          > max by (namespace, job) (barman_cloud_cloudnative_pg_io_last_available_backup_timestamp)
                        )
                        and on (namespace, job)
                        (
                          max by (namespace, job) (
                            time() - barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp
                          ) < 3600
                        )
                      instant: true
                      intervalMs: 1000
                      maxDataPoints: 43200
                      refId: A
                  - refId: B
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: A
                      reducer: max
                      refId: B
                      type: reduce
                  - refId: C
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      conditions:
                        - evaluator:
                            params:
                              - 0
                            type: gt
                          operator:
                            type: and
                          query:
                            params:
                              - C
                          reducer:
                            params: []
                            type: last
                          type: query
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: B
                      refId: C
                      type: threshold
                noDataState: OK
                execErrState: Alerting
                for: 5m
                annotations:
                  summary: CNPG backup failed in the last hour
                  description: A CNPG backup plugin run failed recently.
                labels:
                  severity: critical
              - uid: cnpg-wal-archiving-failing
                title: CNPG WAL archiving is failing
                condition: C
                data:
                  - refId: A
                    datasourceUid: prometheus
                    relativeTimeRange:
                      from: 600
                      to: 0
                    model:
                      datasource:
                        type: prometheus
                        uid: prometheus
                      editorMode: code
                      expr: max by (namespace, job) ((cnpg_pg_stat_archiver_last_failed_time - cnpg_pg_stat_archiver_last_archived_time) > 1)
                      instant: true
                      intervalMs: 1000
                      maxDataPoints: 43200
                      refId: A
                  - refId: B
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: A
                      reducer: max
                      refId: B
                      type: reduce
                  - refId: C
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      conditions:
                        - evaluator:
                            params:
                              - 0
                            type: gt
                          operator:
                            type: and
                          query:
                            params:
                              - C
                          reducer:
                            params: []
                            type: last
                          type: query
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: B
                      refId: C
                      type: threshold
                noDataState: OK
                execErrState: Alerting
                for: 10m
                annotations:
                  summary: CNPG WAL archiving is failing
                  description: A CNPG instance has a failed WAL newer than the last archived WAL.
                labels:
                  severity: critical
              - uid: kube-crashlooping-pods
                title: Kubernetes pods are crashlooping
                condition: C
                data:
                  - refId: A
                    datasourceUid: prometheus
                    relativeTimeRange:
                      from: 600
                      to: 0
                    model:
                      datasource:
                        type: prometheus
                        uid: prometheus
                      editorMode: code
                      expr: sum by (namespace, pod, container, reason) (kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}) > 0
                      instant: true
                      intervalMs: 1000
                      maxDataPoints: 43200
                      refId: A
                  - refId: B
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: A
                      reducer: max
                      refId: B
                      type: reduce
                  - refId: C
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      conditions:
                        - evaluator:
                            params:
                              - 0
                            type: gt
                          operator:
                            type: and
                          query:
                            params:
                              - C
                          reducer:
                            params: []
                            type: last
                          type: query
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: B
                      refId: C
                      type: threshold
                noDataState: OK
                execErrState: Alerting
                for: 10m
                annotations:
                  summary: Kubernetes pod is crashlooping
                  description: One or more containers are waiting in CrashLoopBackOff.
                labels:
                  severity: warning
              - uid: kube-deployment-replicas-mismatch
                title: Kubernetes deployment replicas mismatch
                condition: C
                data:
                  - refId: A
                    datasourceUid: prometheus
                    relativeTimeRange:
                      from: 600
                      to: 0
                    model:
                      datasource:
                        type: prometheus
                        uid: prometheus
                      editorMode: code
                      expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
                      instant: true
                      intervalMs: 1000
                      maxDataPoints: 43200
                      refId: A
                  - refId: B
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: A
                      reducer: max
                      refId: B
                      type: reduce
                  - refId: C
                    datasourceUid: __expr__
                    relativeTimeRange:
                      from: 0
                      to: 0
                    model:
                      conditions:
                        - evaluator:
                            params:
                              - 0
                            type: gt
                          operator:
                            type: and
                          query:
                            params:
                              - C
                          reducer:
                            params: []
                            type: last
                          type: query
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: B
                      refId: C
                      type: threshold
                noDataState: OK
                execErrState: Alerting
                for: 15m
                annotations:
                  summary: Kubernetes deployment replicas mismatch
                  description: A deployment has fewer available replicas than desired.
                labels:
                  severity: warning

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
          - name: kubernetes
            orgId: 1
            folder: Kubernetes
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/kubernetes
          - name: network
            orgId: 1
            folder: Network
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/network
          - name: storage
            orgId: 1
            folder: Storage
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/storage
          - name: system
            orgId: 1
            folder: System
            type: file
            disableDeletion: false
            editable: true
            allowUiUpdates: true
            options:
              path: /var/lib/grafana/dashboards/system

    datasources:
      datasources.yaml:
        apiVersion: 1
        deleteDatasources:
          - { name: Alertmanager, orgId: 1 }
          - { name: Prometheus, orgId: 1 }
          - { name: Loki, orgId: 1 }
        datasources:
          - name: Prometheus
            type: prometheus
            uid: prometheus
            url: http://vmsingle-vm.monitoring.svc.cluster.local:8428
            isDefault: true
          - name: Alertmanager
            type: alertmanager
            uid: alertmanager
            url: http://vmalertmanager-vm.monitoring.svc.cluster.local:9093
            jsonData:
              implementation: prometheus
          - name: Loki
            type: loki
            uid: loki
            url: http://loki-gateway.monitoring.svc.cluster.local
            jsonData:
              maxLines: 1000

    dashboards:
      kubernetes:
        kubernetes-api-server:
          # renovate: depName="Kubernetes / System / API Server"
          gnetId: 15761
          revision: 19
          datasource: Prometheus
        kubernetes-coredns:
          # renovate: depName="Kubernetes / System / CoreDNS"
          gnetId: 15762
          revision: 21
          datasource: Prometheus
        kubernetes-global:
          # renovate: depName="Kubernetes / Views / Global"
          gnetId: 15757
          revision: 43
          datasource: Prometheus
        kubernetes-namespaces:
          # renovate: depName="Kubernetes / Views / Namespaces"
          gnetId: 15758
          revision: 42
          datasource: Prometheus
        kubernetes-nodes:
          # renovate: depName="Kubernetes / Views / Nodes"
          gnetId: 15759
          revision: 37
          datasource: Prometheus
        kubernetes-pods:
          # renovate: depName="Kubernetes / Views / Pods"
          gNetId: 15760
          revision: 36
          datasource: Prometheus

      storage:
        longhorn:
          # renovate: depName="Longhorn"
          gnetId: 16888
          revision: 9
          datasource: Prometheus

      system:
        node-exporter-full:
          # renovate: depName="Node Exporter Full"
          gnetId: 10242
          revision: 1
          datasource: Prometheus

    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
        labelValue: ""
        label: grafana_dashboard
        folderAnnotation: grafana_folder
        provider:
          disableDelete: true
          foldersFromFilesStructure: true
      datasources:
        enabled: false

    plugins: []

    pluginManagement:
      plugins.yaml:
        apiVersion: 1
        apps:
          - type: grafana-oncall-app
            org_id: 1
            disabled: false
            jsonData:
              stackId: 1
              orgId: 1
              onCallApiUrl: $GF_PLUGIN_GRAFANA_ONCALL_APP_ONCALL_API_URL
            secureJsonData:
              grafanaToken: $GF_PLUGIN_GRAFANA_ONCALL_APP_ONCALL_TOKEN

    serviceMonitor:
      enabled: true
      metricRelabelings:
        - action: labeldrop
          regex: (pod)

    persistence:
      enabled: true
      storageClassName: longhorn
      accessModes:
        - ReadWriteMany
      size: 50Gi

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: *app
