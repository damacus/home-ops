---
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: Cloudflare DNS
    group: connectivity
    url: 1.1.1.1
    dns:
      query-name: "cloudflare.com"
      query-type: "A"
    interval: 1m
    conditions:
      - "[DNS_RCODE] == NOERROR"

  - name: Google DNS
    group: connectivity
    url: 8.8.8.8
    dns:
      query-name: "google.com"
      query-type: "A"
    interval: 1m
    conditions:
      - "[DNS_RCODE] == NOERROR"

external-endpoints:
  - name: Alertmanager Watchdog
    group: cluster
    token: "${GATUS_WATCHDOG_TOKEN}"
    heartbeat:
      interval: 10m

metrics: true

storage:
  type: sqlite
  caching: true
  path: /config/gatus.db

ui:
  title: Status | Home Cluster
  header: Home Cluster Status
  buttons:
    - name: GitHub
      link: https://github.com/damacus/home-ops

web:
  port: ${GATUS_WEB_PORT}
