---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: miscellaneous-rules
spec:
  groups:
    - name: image-pulls
      rules:
        - alert: ImagePullErrors
          annotations:
            summary: Kubernetes image pulls are failing
            description: "Kubelet reported {{ $value | printf \"%.0f\" }} image pull errors in the last 15 minutes. Check pod events for ImagePullBackOff, ErrImagePull, registry authentication, or upstream registry rate limits."
          expr: |
            sum(increase(kubelet_runtime_operations_errors_total{job="kubelet", operation_type="pull_image"}[15m])) > 0
          for: 5m
          labels:
            severity: critical
        - alert: HighImagePullVolume
          annotations:
            summary: Kubernetes image pull volume is elevated
            description: "Kubelet reported {{ $value | printf \"%.0f\" }} image pull operations in the last 15 minutes. This usually means node bootstrap, a broad rollout, or repeated pod churn is pulling images aggressively."
          expr: |
            sum(increase(kubelet_runtime_operations_total{job="kubelet", operation_type="pull_image"}[15m])) > 30
          for: 5m
          labels:
            severity: warning
        - alert: DockerHubContainerStartBurst
          annotations:
            summary: Docker Hub backed containers are starting frequently
            description: "{{ $value | printf \"%.0f\" }} Docker Hub backed container start-time changes were observed in the last 15 minutes. This is a registry-specific churn proxy, not a direct pull counter; pair it with HighImagePullVolume or ImagePullErrors before treating it as rate-limit pressure."
          expr: |
            sum(changes(container_start_time_seconds{image=~"docker.io.*",container!="",pod!=""}[15m])) > 25
          for: 5m
          labels:
            severity: warning
    - name: home-assistant
      rules:
        - alert: HomeAssistantNestAuthFailure
          annotations:
            summary: Home Assistant Nest Integration Authentication Failure
            description: "The Nest integration in Home Assistant is failing to authenticate with Google API."
          expr: increase(home_ops_home_assistant_nest_auth_failure_total[15m]) > 0
          for: 5m
          labels:
            severity: warning
    - name: oom
      rules:
        - alert: OOMKilled
          annotations:
            summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
          expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
          labels:
            severity: critical
    - name: resource-state
      rules:
        - alert: ExternalSecretNotReady
          annotations:
            summary: "ExternalSecret {{ $labels.namespace }}/{{ $labels.name }} is not Ready"
            description: "ExternalSecret Ready condition is not true. Reason: {{ $labels.reason }}."
          expr: |
            kube_external_secret_status_condition{type="Ready"} != 1
          for: 10m
          labels:
            severity: warning
        - alert: PushSecretNotReady
          annotations:
            summary: "PushSecret {{ $labels.namespace }}/{{ $labels.name }} is not Ready"
            description: "PushSecret Ready condition is not true. Reason: {{ $labels.reason }}."
          expr: |
            kube_push_secret_status_condition{type="Ready"} != 1
          for: 10m
          labels:
            severity: warning
        - alert: PersistentVolumeUnusable
          annotations:
            summary: "PersistentVolume {{ $labels.persistentvolume }} is {{ $labels.phase }}"
            description: "PersistentVolume has stayed in {{ $labels.phase }} for more than 30 minutes."
          expr: |
            kube_persistentvolume_status_phase{phase=~"Failed|Released"} == 1
          for: 30m
          labels:
            severity: warning
        - alert: PersistentVolumeStuckDeleting
          annotations:
            summary: "PersistentVolume {{ $labels.persistentvolume }} is stuck deleting"
            description: "PersistentVolume has a deletion timestamp but is still present after 30 minutes."
          expr: |
            kube_persistentvolume_deletion_timestamp > 0
          for: 30m
          labels:
            severity: warning
        - alert: KubeJobFailedRecently
          annotations:
            summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed recently"
            description: "Job has failed pods and started less than 2 hours ago."
          expr: |
            kube_job_status_failed > 0
            and on(namespace, job_name)
            (time() - kube_job_status_start_time < 2 * 60 * 60)
          for: 5m
          labels:
            severity: warning
        - alert: CNPGObjectStoreBackupFailed
          annotations:
            summary: "CNPG ObjectStore backup failed for {{ $labels.namespace }}/{{ $labels.cluster }}"
            description: "The latest failed Barman backup timestamp is newer than the latest successful backup timestamp."
          expr: |
            kube_cnpg_objectstore_last_failed_backup_timestamp
            > on(namespace, name, cluster)
            kube_cnpg_objectstore_last_successful_backup_timestamp
          for: 10m
          labels:
            severity: critical
    - name: node-hardware
      rules:
        - alert: NodeHighCpuTemperature
          annotations:
            summary: "High CPU temperature on {{ $labels.instance }}"
            description: "CPU thermal zone {{ $labels.chip }} on {{ $labels.instance }} is at {{ $value | printf \"%.1f\" }}°C (threshold: 75°C)"
          expr: |
            node_hwmon_temp_celsius{chip=~"thermal.*"} > 75
          for: 5m
          labels:
            severity: warning
        - alert: NodeCriticalCpuTemperature
          annotations:
            summary: "Critical CPU temperature on {{ $labels.instance }}"
            description: "CPU thermal zone {{ $labels.chip }} on {{ $labels.instance }} is at {{ $value | printf \"%.1f\" }}°C, approaching critical threshold"
          expr: |
            node_hwmon_temp_celsius{chip=~"thermal.*"} > 90
          for: 2m
          labels:
            severity: critical
        - alert: NodeNvmeHighTemperature
          annotations:
            summary: "High NVMe temperature on {{ $labels.instance }}"
            description: "NVMe drive on {{ $labels.instance }} is at {{ $value | printf \"%.1f\" }}°C (threshold: 70°C)"
          expr: |
            node_hwmon_temp_celsius{chip=~"nvme.*", sensor="temp1"} > 70
          for: 5m
          labels:
            severity: warning
        - alert: NodeTemperatureNearCritical
          annotations:
            summary: "Temperature approaching critical on {{ $labels.instance }}"
            description: "{{ $labels.chip }} on {{ $labels.instance }} is at {{ $value | printf \"%.0f\" }}% of critical threshold"
          expr: |
            (node_hwmon_temp_celsius / on(chip, instance, sensor) node_hwmon_temp_crit_celsius) * 100 > 80
          for: 5m
          labels:
            severity: warning
