---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gatus
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - name: ghcr-credentials

    deploymentAnnotations:
      reloader.stakater.com/auto: "true"

    gatus:
      image:
        tag: v5.36.0
      env:
        TZ: Europe/London
      extraEnv:
        - name: GATUS_WATCHDOG_TOKEN
          valueFrom:
            secretKeyRef:
              name: gatus-secret
              key: GATUS_WATCHDOG_TOKEN
      port: 8080

    sidecar:
      enabled: true
      gatewayNames:
        - traefik-internal
      defaultInterval: 1m
      logLevel: info
      kinds:
        ingress:
          enable: false
          auto: false
          prefix: ""
        httproute:
          enable: true
          auto: true
          prefix: ""
        service:
          enable: false
          auto: false
          prefix: ""
        ingressroute:
          enable: false
          auto: false
          prefix: ""

    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml

    service:
      port: 8080

    monitoring:
      serviceMonitor:
        enabled: true
        interval: 1m
        scrapeTimeout: 10s

    persistence:
      enabled: false

    httpRoute:
      enabled: true
      annotations:
        external-dns.alpha.kubernetes.io/target: "traefik-int.ironstone.casa"
      hostnames:
        - gatus.ironstone.casa
      parentRefs:
        - name: traefik-internal
          namespace: network
          sectionName: websecure
      matches:
        - path:
            type: PathPrefix
            value: /
