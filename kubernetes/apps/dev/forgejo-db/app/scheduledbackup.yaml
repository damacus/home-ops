---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: forgejo-green
  namespace: dev
spec:
  schedule: "0 5 0 * * *"
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      objectStore: forgejo-rustfs-store
  cluster:
    name: forgejo-green
