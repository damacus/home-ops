---
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: Cloudflare DNS
    group: connectivity
    url: 1.1.1.1
    dns:
      query-name: "cloudflare.com"
      query-type: "A"
    interval: 1m
    conditions:
      - "[DNS_RCODE] == NOERROR"

  - name: Google DNS
    group: connectivity
    url: 8.8.8.8
    dns:
      query-name: "google.com"
      query-type: "A"
    interval: 1m
    conditions:
      - "[DNS_RCODE] == NOERROR"

  - name: Med Tracker Canary Up
    group: med-tracker-canary
    url: https://med-tracker-canary.damacus.io/up
    interval: 1m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"

  - name: Med Tracker Canary Login
    group: med-tracker-canary
    url: https://med-tracker-canary.damacus.io/login
    interval: 5m
    conditions:
      - "[STATUS] < 400"
      - "[RESPONSE_TIME] < 5000"

external-endpoints:
  - name: Alertmanager Watchdog
    group: cluster
    token: "${GATUS_WATCHDOG_TOKEN}"
    heartbeat:
      interval: 10m

metrics: true

storage:
  type: sqlite
  caching: true
  path: /config/gatus.db

ui:
  title: Status | Home Cluster
  header: Home Cluster Status
  buttons:
    - name: GitHub
      link: https://github.com/damacus/home-ops

web:
  port: 8080
