---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name csi-driver-smb
  namespace: storage
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    template:
      engineVersion: v2
  dataFrom:
    - extract:
        key: *name
