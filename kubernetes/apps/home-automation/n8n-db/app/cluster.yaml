---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-green
  namespace: home-automation
spec:
  imagePullSecrets:
    - name: ghcr-credentials
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql
    major: 18
  instances: 2
  primaryUpdateStrategy: unsupervised
  enablePDB: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: n8n-rustfs-store
        serverName: n8n-green
  monitoring:
    enablePodMonitor: true
  storage:
    size: 10Gi
    storageClass: openebs-hostpath
  enableSuperuserAccess: true
  superuserSecret:
    name: n8n-superuser
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 128MB
      effective_io_concurrency: "200"
      maintenance_work_mem: 128MB
      # Logical replication prerequisites for blue/green major version upgrade.
      wal_level: logical
      max_replication_slots: "10"
      max_wal_senders: "10"
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 1Gi
      cpu: 1000m
  bootstrap:
    initdb:
      database: app
      owner: app
