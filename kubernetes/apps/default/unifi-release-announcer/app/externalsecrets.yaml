---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name unifi-release-announcer
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    template:
      engineVersion: v2
  data:
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: *name
        property: DISCORD_BOT_TOKEN
    - secretKey: DISCORD_CHANNEL_ID
      remoteRef:
        key: *name
        property: DISCORD_CHANNEL_ID
