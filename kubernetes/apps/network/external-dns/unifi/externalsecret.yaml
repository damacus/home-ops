---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-unifi
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: external-dns-unifi-secret
    template:
      engineVersion: v2
      data:
        api-key: "{{ .API_KEY }}"
  dataFrom:
    - extract:
        key: external-dns-unifi
