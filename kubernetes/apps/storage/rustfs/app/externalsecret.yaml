---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Before deploying, create a "rustfs" item in 1Password with:
#   username: the S3 access key ID   (choose freely, e.g. "rustfsadmin")
#   password: the S3 secret key      (generate a strong random string, min 8 chars)
#
# These are the admin credentials any S3 client uses to authenticate to RustFS.
# They are equivalent to MinIO's MINIO_ROOT_USER / MINIO_ROOT_PASSWORD.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name rustfs-credentials
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        RUSTFS_ACCESS_KEY: "{{ .username }}"
        RUSTFS_SECRET_KEY: "{{ .password }}"
        ACCESS_KEY_ID: "{{ .username }}"
        SECRET_ACCESS_KEY: "{{ .password }}"
        aws-access-key-id: "{{ .username }}"
        aws-secret-access-key: "{{ .password }}"
  dataFrom:
    - extract:
        key: rustfs
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustfs-cnpg-credentials
  namespace: storage
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: rustfs-cnpg-credentials
    template:
      engineVersion: v2
      metadata:
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "authentication,dev,home,home-automation"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "authentication,dev,home,home-automation"
      data:
        ACCESS_KEY_ID: "{{ .username }}"
        SECRET_ACCESS_KEY: "{{ .password }}"
  dataFrom:
    - extract:
        key: rustfs
