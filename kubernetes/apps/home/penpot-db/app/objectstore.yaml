---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: penpot-rustfs-store
  namespace: home
spec:
  retentionPolicy: 30d
  configuration:
    destinationPath: s3://cnpg-penpot/
    endpointURL: http://rustfs.storage.svc.cluster.local:9000
    s3Credentials:
      accessKeyId:
        name: rustfs-cnpg-penpot
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: rustfs-cnpg-penpot
        key: SECRET_ACCESS_KEY
    data:
      compression: bzip2
    wal:
      compression: bzip2
      maxParallel: 2
