---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo-server
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-credentials

    controllers:
      echo-server:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/mendhak/http-https-echo
              tag: 41@sha256:2046be25f4a2c0bdda662ebfb7c2b7b60fc95c31d97987be143645a8a2194a40
            env:
              HTTP_PORT: &port 8080
              LOG_WITHOUT_NEWLINE: true
              LOG_IGNORE_PATH: /healthz
              PROMETHEUS_ENABLED: true

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
              seccompProfile:
                type: RuntimeDefault

            resources:
              requests:
                cpu: 10m
              limits:
                memory: 64Mi
        pod:
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true

    service:
      app:
        controller: echo-server
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "traefik-int.ironstone.casa"
          gatus.home-operations.com/endpoint: |
            name: Echo Server (Internal)
            group: cluster
            conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 2000"
        hostnames: ["{{ .Release.Name }}.ironstone.casa"]
        parentRefs:
          - name: traefik-internal
            namespace: network
            sectionName: websecure
      external:
        annotations:
          external-dns.alpha.kubernetes.io/target: "traefik-ext.damacus.io"
          gatus.home-operations.com/endpoint: |
            name: Echo Server (External)
            group: cluster
            conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"
        hostnames: ["{{ .Release.Name }}.damacus.io"]
        parentRefs:
          - name: traefik-internal
            namespace: network
            sectionName: websecure
