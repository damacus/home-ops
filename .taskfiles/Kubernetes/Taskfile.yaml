---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  CLUSTER_HEALTH_SCRIPT: "{{.SCRIPTS_DIR}}/cluster-health.py"
  MONDOO_SCAN_SCRIPT: "{{.SCRIPTS_DIR}}/mondoo_scan.py"
  MED_TRACKER_CANARY_APP: "{{.KUBERNETES_DIR}}/apps/home/med-tracker-canary/app"
  MED_TRACKER_CANARY_DB: "{{.KUBERNETES_DIR}}/apps/home/med-tracker-canary-db/app"
  GATUS_CONFIG: "{{.KUBERNETES_DIR}}/apps/monitoring/gatus/app/resources/config.yaml"
  RUSTFS_IAM_POLICY: "{{.ROOT_DIR}}/tests/mondoo/rustfs-iam.mql.yaml"
  RUSTFS_IAM_LIVE_POLICY: "{{.ROOT_DIR}}/tests/mondoo/rustfs-iam-live.mql.yaml"
  RUSTFS_IAM_LIVE_CHECK_SCRIPT: "{{.SCRIPTS_DIR}}/rustfs_iam_live_check.sh"

tasks:
  resources:
    desc: Gather common resources in your cluster, useful when asking for support
    cmds:
      - for: { var: resource }
        cmd: kubectl get {{.ITEM}} {{.CLI_ARGS | default "-A"}}
    vars:
      resource: >-
        nodes
        gitrepositories
        kustomizations
        helmrepositories
        helmreleases
        certificates
        certificaterequests
        ingresses
        pods

  check-kube-vip:
    desc: Check all kube-vip pods
    cmd: kubectl get pods -n kube-system -l app.kubernetes.io/name=kube-vip -o wide

  health:
    desc: Run read-only cluster health checks
    summary: |
      Checks nodes, kube-vip, Cilium, active pod readiness, deployment
      availability, CNPG cluster state, and firing Grafana/Prometheus alerts.

      Examples:
        task kubernetes:health
        task kubernetes:health json=true
        task kubernetes:health notify=true
        task kubernetes:health workers=4 timeout=30
    vars:
      JSON: '{{.json | default "false"}}'
      NOTIFY: '{{.notify | default "false"}}'
      WORKERS: '{{.workers | default "6"}}'
      TIMEOUT: '{{.timeout | default "45"}}'
    cmd: >-
      {{.PYTHON_BIN}} {{.CLUSTER_HEALTH_SCRIPT}} health
      {{if eq .JSON "true"}}--json{{end}}
      {{if eq .NOTIFY "true"}}--notify{{end}}
      --workers {{.WORKERS}}
      --timeout {{.TIMEOUT}}
    preconditions:
      - { msg: "Missing Python interpreter", sh: "command -v {{.PYTHON_BIN}} >/dev/null" }
      - { msg: "Missing cluster health script", sh: "test -f {{.CLUSTER_HEALTH_SCRIPT}}" }
      - { msg: "Missing kubectl", sh: "command -v kubectl >/dev/null" }

  cnpg-health:
    desc: Check all CNPG clusters for healthy ready state
    vars:
      JSON: '{{.json | default "false"}}'
      NOTIFY: '{{.notify | default "false"}}'
      WORKERS: '{{.workers | default "6"}}'
      TIMEOUT: '{{.timeout | default "45"}}'
    cmd: >-
      {{.PYTHON_BIN}} {{.CLUSTER_HEALTH_SCRIPT}} cnpg-health
      {{if eq .JSON "true"}}--json{{end}}
      {{if eq .NOTIFY "true"}}--notify{{end}}
      --workers {{.WORKERS}}
      --timeout {{.TIMEOUT}}
    preconditions:
      - { msg: "Missing cluster health script", sh: "test -f {{.CLUSTER_HEALTH_SCRIPT}}" }
      - { msg: "Missing kubectl", sh: "command -v kubectl >/dev/null" }

  cnpg-backups:
    desc: Check CNPG backup resources and WAL archiving status
    summary: |
      Summarizes latest Backup resources, latest successful backups, and
      kubectl cnpg status WAL archiving health for every CNPG cluster.

      Examples:
        task kubernetes:cnpg-backups
        task kubernetes:cnpg-backups notify=true
    vars:
      JSON: '{{.json | default "false"}}'
      NOTIFY: '{{.notify | default "false"}}'
      WORKERS: '{{.workers | default "6"}}'
      TIMEOUT: '{{.timeout | default "45"}}'
    cmd: >-
      {{.PYTHON_BIN}} {{.CLUSTER_HEALTH_SCRIPT}} cnpg-backups
      {{if eq .JSON "true"}}--json{{end}}
      {{if eq .NOTIFY "true"}}--notify{{end}}
      --workers {{.WORKERS}}
      --timeout {{.TIMEOUT}}
    preconditions:
      - { msg: "Missing cluster health script", sh: "test -f {{.CLUSTER_HEALTH_SCRIPT}}" }
      - { msg: "Missing kubectl", sh: "command -v kubectl >/dev/null" }

  grafana-alerts:
    desc: Check firing Grafana/Prometheus and Alertmanager alerts
    vars:
      JSON: '{{.json | default "false"}}'
      NOTIFY: '{{.notify | default "false"}}'
      WORKERS: '{{.workers | default "6"}}'
      TIMEOUT: '{{.timeout | default "45"}}'
    cmd: >-
      {{.PYTHON_BIN}} {{.CLUSTER_HEALTH_SCRIPT}} grafana-alerts
      {{if eq .JSON "true"}}--json{{end}}
      {{if eq .NOTIFY "true"}}--notify{{end}}
      --workers {{.WORKERS}}
      --timeout {{.TIMEOUT}}
    preconditions:
      - { msg: "Missing cluster health script", sh: "test -f {{.CLUSTER_HEALTH_SCRIPT}}" }
      - { msg: "Missing kubectl", sh: "command -v kubectl >/dev/null" }

  morning-check:
    desc: Run the recurring morning cluster health bundle
    summary: |
      Runs the regular operator checks: cluster core health, CNPG clusters,
      CNPG backups/WAL archiving, and firing alerts. Gatus handles continuous
      edge checks; local edge smoke and log-noise can be included on demand.

      Examples:
        task kubernetes:morning-check
        task kubernetes:morning-check notify=true
        task kubernetes:morning-check edge_smoke=true
        task kubernetes:morning-check log_noise=true period=6h top=10
    vars:
      JSON: '{{.json | default "false"}}'
      NOTIFY: '{{.notify | default "false"}}'
      EDGE_SMOKE: '{{.edge_smoke | default "false"}}'
      LOG_NOISE: '{{.log_noise | default "false"}}'
      PERIOD: '{{.period | default "1h"}}'
      TOP: '{{.top | default "20"}}'
      WORKERS: '{{.workers | default "6"}}'
      TIMEOUT: '{{.timeout | default "45"}}'
    cmd: >-
      {{.PYTHON_BIN}} {{.CLUSTER_HEALTH_SCRIPT}} morning-check
      {{if eq .JSON "true"}}--json{{end}}
      {{if eq .NOTIFY "true"}}--notify{{end}}
      {{if eq .EDGE_SMOKE "true"}}--edge-smoke{{end}}
      {{if eq .LOG_NOISE "true"}}--log-noise{{end}}
      --period {{.PERIOD}}
      --top {{.TOP}}
      --workers {{.WORKERS}}
      --timeout {{.TIMEOUT}}
    preconditions:
      - { msg: "Missing cluster health script", sh: "test -f {{.CLUSTER_HEALTH_SCRIPT}}" }
      - { msg: "Missing kubectl", sh: "command -v kubectl >/dev/null" }

  yayamlls:
    desc: Validate Kubernetes manifests with yayamlls and rendered Flux output
    cmd: yayamlls validate --render {{.KUBERNETES_DIR}}
    preconditions:
      - { msg: "Missing yayamlls", sh: "command -v yayamlls >/dev/null" }

  rustfs-iam-policy:
    desc: Validate RustFS per-app IAM policy with Mondoo cnspec
    cmds:
      - cnspec --auto-update=false policy lint {{.RUSTFS_IAM_POLICY}}
      - cnspec --auto-update=false scan local --policy-bundle {{.RUSTFS_IAM_POLICY}} --incognito
    preconditions:
      - { msg: "Missing cnspec", sh: "command -v cnspec >/dev/null" }
      - { msg: "Missing RustFS IAM policy", sh: "test -f {{.RUSTFS_IAM_POLICY}}" }

  rustfs-iam-live-policy:
    desc: Validate live RustFS IAM users and policies with Mondoo cnspec
    summary: |
      Requires a configured rc alias named "rustfs" with RustFS admin
      credentials. This is intentionally not part of CI because it checks live
      cluster state.
    cmds:
      - cnspec --auto-update=false policy lint {{.RUSTFS_IAM_LIVE_POLICY}}
      - cnspec --auto-update=false scan local --policy-bundle {{.RUSTFS_IAM_LIVE_POLICY}} --incognito
    preconditions:
      - { msg: "Missing cnspec", sh: "command -v cnspec >/dev/null" }
      - { msg: "Missing rc", sh: "command -v rc >/dev/null" }
      - { msg: "Missing jq", sh: "command -v jq >/dev/null" }
      - { msg: "Missing RustFS live IAM policy", sh: "test -f {{.RUSTFS_IAM_LIVE_POLICY}}" }
      - { msg: "Missing RustFS live IAM check script", sh: "test -f {{.RUSTFS_IAM_LIVE_CHECK_SCRIPT}}" }

  med-tracker-canary-isolation:
    desc: Assert Med Tracker canary isolation and production update controls
    cmds:
      - yq -e '[.packageRules[] | select(.matchPackageNames[] == "ghcr.io/damacus/med-tracker")] | (length == 1 and .[0].enabled == false)' {{.ROOT_DIR}}/.github/renovate.json5
      - yq -e '.spec.values.controllers."med-tracker".initContainers.migrate.image.tag == "0.5.15"' {{.KUBERNETES_DIR}}/apps/home/med-tracker/app/helmrelease.yaml
      - yq -e '.spec.values.controllers."med-tracker".initContainers.migrate.env | has("DATABASE_ROLE") | not' {{.KUBERNETES_DIR}}/apps/home/med-tracker/app/helmrelease.yaml
      - yq -e '.metadata.name == "med-tracker-canary" and .spec.values.controllers."med-tracker-canary".containers.app.env.APP_URL == "https://med-tracker-canary.damacus.io"' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.values.controllers."med-tracker-canary".containers.app.env.OIDC_REDIRECT_URI == "https://med-tracker-canary.damacus.io/auth/oidc/callback"' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.values.controllers."med-tracker-canary".containers.app.env.SMTP_ENABLED == "false" and .spec.values.controllers."med-tracker-canary".containers.app.env.PUSH_NOTIFICATIONS_ENABLED == "false"' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.values.controllers."med-tracker-canary".initContainers.migrate.envFrom[0].secretRef.name == "med-tracker-canary-secret"' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.values.controllers."med-tracker-canary".containers.app.envFrom[0].secretRef.name == "med-tracker-canary-secret"' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.values.persistence.storage.existingClaim == "med-tracker-canary-storage"' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.values.route.external.hostnames[0] == "med-tracker-canary.damacus.io" and .spec.values.route.external.annotations."external-dns.alpha.kubernetes.io/target" == "traefik-ext.damacus.io"' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.values.route.external.rules[] | select(.matches[0].path.value == "/" and .filters[0].extensionRef.name == "oauth2-proxy-damacus-forward-auth" and .backendRefs[0].name == "med-tracker-canary")' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.values.route.external.rules[] | select(.matches[0].path.value == "/up" and .backendRefs[0].name == "med-tracker-canary")' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.values.route.external.rules[] | select(.matches[0].path.value == "/login" and .backendRefs[0].name == "med-tracker-canary")' {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml
      - yq -e '.spec.target.name == "med-tracker-canary-secret"' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.spec.dataFrom[] | select(.extract.key == "zitadel-med-tracker-canary-oidc")' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.spec.target.template.data.DATABASE_URL | contains("@med-tracker-canary-rw.home.svc.cluster.local:5432/")' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.spec.target.template.data.SOLID_CACHE_DATABASE_URL | contains("@med-tracker-canary-rw.home.svc.cluster.local:5432/")' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.spec.target.template.data.SOLID_QUEUE_DATABASE_URL | contains("@med-tracker-canary-rw.home.svc.cluster.local:5432/")' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.spec.target.template.data.SOLID_CABLE_DATABASE_URL | contains("@med-tracker-canary-rw.home.svc.cluster.local:5432/")' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.spec.target.template.data.DATABASE_URL | contains("med-tracker-rw.home.svc.cluster.local") | not' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.spec.target.template.data.SOLID_CACHE_DATABASE_URL | contains("med-tracker-rw.home.svc.cluster.local") | not' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.spec.target.template.data.SOLID_QUEUE_DATABASE_URL | contains("med-tracker-rw.home.svc.cluster.local") | not' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.spec.target.template.data.SOLID_CABLE_DATABASE_URL | contains("med-tracker-rw.home.svc.cluster.local") | not' {{.MED_TRACKER_CANARY_APP}}/externalsecret.yaml
      - yq -e '.metadata.name == "med-tracker-canary" and .spec.bootstrap.recovery.source == "med-tracker-production-backup"' {{.MED_TRACKER_CANARY_DB}}/cluster.yaml
      - yq -e '.spec.bootstrap.recovery.database == "med-tracker" and .spec.bootstrap.recovery.owner == "med-tracker" and .spec.bootstrap.recovery.secret.name == "med-tracker-canary-db"' {{.MED_TRACKER_CANARY_DB}}/cluster.yaml
      - yq -e '.spec.plugins[] | select(.name == "barman-cloud.cloudnative-pg.io" and .isWALArchiver == true and .parameters.barmanObjectName == "med-tracker-canary-rustfs-store" and .parameters.serverName == "med-tracker-canary")' {{.MED_TRACKER_CANARY_DB}}/cluster.yaml
      - yq -e '.spec.externalClusters[] | select(.name == "med-tracker-production-backup" and .plugin.name == "barman-cloud.cloudnative-pg.io" and .plugin.parameters.barmanObjectName == "med-tracker-rustfs-store" and .plugin.parameters.serverName == "med-tracker")' {{.MED_TRACKER_CANARY_DB}}/cluster.yaml
      - yq -e '.metadata.name == "med-tracker-canary" and .spec.bootstrap.initdb == null' {{.MED_TRACKER_CANARY_DB}}/cluster.yaml
      - yq -e '.metadata.name == "med-tracker-canary-rustfs-store" and .spec.configuration.destinationPath == "s3://cnpg-med-tracker-canary/"' {{.MED_TRACKER_CANARY_DB}}/objectstore.yaml
      - yq -e '.spec.configuration.s3Credentials.accessKeyId.name == "rustfs-cnpg-med-tracker-canary" and .spec.configuration.s3Credentials.secretAccessKey.name == "rustfs-cnpg-med-tracker-canary"' {{.MED_TRACKER_CANARY_DB}}/objectstore.yaml
      - yq -e '.endpoints[] | select(.name == "Med Tracker Canary Up" and .url == "https://med-tracker-canary.damacus.io/up")' {{.GATUS_CONFIG}}
      - yq -e '.endpoints[] | select(.name == "Med Tracker Canary Login" and .url == "https://med-tracker-canary.damacus.io/login")' {{.GATUS_CONFIG}}
    preconditions:
      - { msg: "Missing yq", sh: "command -v yq >/dev/null" }
      - { msg: "Missing Med Tracker canary app manifests", sh: "test -f {{.MED_TRACKER_CANARY_APP}}/helmrelease.yaml" }
      - { msg: "Missing Med Tracker canary DB manifests", sh: "test -f {{.MED_TRACKER_CANARY_DB}}/cluster.yaml" }
      - { msg: "Missing Gatus config", sh: "test -f {{.GATUS_CONFIG}}" }

  mondoo-operator-assertions:
    desc: Assert the Mondoo Operator GitOps manifests are wired safely
    cmds:
      - yq -e '.resources | contains(["mondoo.yaml"])' {{.KUBERNETES_DIR}}/flux/repositories/helm/kustomization.yaml
      - yq -e '.metadata.name == "mondoo" and .spec.url == "https://mondoohq.github.io/mondoo-operator"' {{.KUBERNETES_DIR}}/flux/repositories/helm/mondoo.yaml
      - yq -e '.resources | contains(["./namespace.yaml", "./mondoo-operator/ks.yaml", "./mondoo-operator/config-ks.yaml"])' {{.KUBERNETES_DIR}}/apps/security/kustomization.yaml
      - yq -e '.metadata.name == "mondoo-operator" and .metadata.namespace == "flux-system" and .spec.targetNamespace == "mondoo-operator" and .spec.path == "./kubernetes/apps/security/mondoo-operator/app"' {{.KUBERNETES_DIR}}/apps/security/mondoo-operator/ks.yaml
      - yq -e '[(.metadata.name == "mondoo-operator-config"), (.metadata.namespace == "flux-system"), (.spec.targetNamespace == "mondoo-operator"), (.spec.path == "./kubernetes/apps/security/mondoo-operator/config"), ([.spec.dependsOn[].name] | contains(["external-secrets-stores", "mondoo-operator"]))] | all' {{.KUBERNETES_DIR}}/apps/security/mondoo-operator/config-ks.yaml
      - yq -e '.spec.chart.spec.chart == "mondoo-operator" and .spec.chart.spec.version == "13.1.1" and .spec.chart.spec.sourceRef.name == "mondoo"' {{.KUBERNETES_DIR}}/apps/security/mondoo-operator/app/helmrelease.yaml
      - yq -e '.spec.secretStoreRef.name == "onepassword-connect" and .spec.target.name == "mondoo-client" and (.spec.target.template.data.config | contains("MONDOO_CONFIG_JSON")) and .spec.dataFrom[0].extract.key == "mondoo"' {{.KUBERNETES_DIR}}/apps/security/mondoo-operator/config/externalsecret.yaml
      - yq -e '[(.spec.mondooCredsSecretRef.name == "mondoo-client"), (.spec.kubernetesResources.enable == true), (.spec.nodes.enable == true), (.spec.nodes.style == "cronjob"), (.spec.containers.enable == false), ((.spec.kubernetesResources.resourceWatcher | type) == "!!null")] | all' {{.KUBERNETES_DIR}}/apps/security/mondoo-operator/config/auditconfig.yaml
      - yq -e '.spec.filtering.namespaces.exclude | contains(["mondoo-operator", "kube-system", "flux-system"])' {{.KUBERNETES_DIR}}/apps/security/mondoo-operator/config/auditconfig.yaml
    preconditions:
      - { msg: "Missing yq", sh: "command -v yq >/dev/null" }

  object-storage-migrate:
    desc: Copy or sync objects between MinIO and RustFS with local rclone
    summary: |
      Reads S3 credentials from the live Kubernetes secrets in the storage
      namespace and uses local rclone to copy or sync objects between the
      MinIO and RustFS S3 endpoints.

      Examples:
        task kubernetes:object-storage-migrate
        task kubernetes:object-storage-migrate source_path=med-tracker destination_path=med-tracker
        task kubernetes:object-storage-migrate mode=sync dry_run=true
    vars:
      SCRIPT: "{{.ROOT_DIR}}/scripts/object_storage_migrate.sh"
      SOURCE: '{{.source | default "minio"}}'
      DESTINATION: '{{.destination | default "rustfs"}}'
      MODE: '{{.mode | default "copy"}}'
      SOURCE_PATH: '{{.source_path | default ""}}'
      DESTINATION_PATH: '{{.destination_path | default ""}}'
      DRY_RUN: '{{.dry_run | default "false"}}'
    cmd: >-
      bash {{.SCRIPT}}
      --source {{.SOURCE}}
      --destination {{.DESTINATION}}
      --mode {{.MODE}}
      {{if .SOURCE_PATH}}--source-path {{.SOURCE_PATH}}{{end}}
      {{if .DESTINATION_PATH}}--destination-path {{.DESTINATION_PATH}}{{end}}
      {{if eq .DRY_RUN "true"}}--dry-run{{end}}
    preconditions:
      - { msg: "Missing migration script", sh: "test -f {{.SCRIPT}}" }
      - { msg: "Missing kubectl", sh: "command -v kubectl >/dev/null" }
      - { msg: "Missing rclone", sh: "command -v rclone >/dev/null" }

  edge-smoke:
    desc: Run baseline HTTP and WebSocket smoke checks for the Traefik edge
    summary: |
      Uses curl plus a lightweight WebSocket handshake to validate the main
      internal Traefik routes. HTTP/3 checks are informational and only run
      when the local curl build supports them.

      Examples:
        task kubernetes:edge-smoke
        task kubernetes:edge-smoke skip_http3=true
    cmd: "{{.PYTHON_BIN}} {{.ROOT_DIR}}/scripts/edge_smoke.py {{if eq .skip_http3 \"true\"}}--skip-http3{{end}}"
    vars:
      skip_http3: '{{.skip_http3 | default "false"}}'
    preconditions:
      - { msg: "Missing Python interpreter", sh: "command -v {{.PYTHON_BIN}} >/dev/null" }
      - { msg: "Missing edge smoke script", sh: "test -f {{.ROOT_DIR}}/scripts/edge_smoke.py" }

  edge-smoke-esphome:
    desc: Run edge smoke checks plus the ESPHome Traefik canary hostname
    summary: |
      Extends the baseline edge smoke checks with the ESPHome Traefik canary
      hostname before cutting over the production internal hostname. Supply
      esphome_ws_path and esphome_ws_contains when a stable WebSocket endpoint
      is known and should be enforced by the smoke test.

      Example:
        task kubernetes:edge-smoke-esphome esphome_ws_path=/ws
    cmd: "{{.PYTHON_BIN}} {{.ROOT_DIR}}/scripts/edge_smoke.py --include-esphome-canary {{if eq .skip_http3 \"true\"}}--skip-http3{{end}} {{if .esphome_ws_path}}--esphome-websocket-path {{.esphome_ws_path}}{{end}} {{if .esphome_ws_contains}}--esphome-websocket-contains {{.esphome_ws_contains}}{{end}}"
    vars:
      skip_http3: '{{.skip_http3 | default "false"}}'
      esphome_ws_path: '{{.esphome_ws_path | default ""}}'
      esphome_ws_contains: '{{.esphome_ws_contains | default ""}}'
    preconditions:
      - { msg: "Missing Python interpreter", sh: "command -v {{.PYTHON_BIN}} >/dev/null" }
      - { msg: "Missing edge smoke script", sh: "test -f {{.ROOT_DIR}}/scripts/edge_smoke.py" }

  .reset:
    internal: true
    cmd: rm -rf {{.KUBERNETES_DIR}}

  alerts:
    desc: Get all alerts from VictoriaMetrics
    silent: true
    cmd: |
      kubectl exec -n monitoring vmalertmanager-vm-0 -- wget -qO- 'http://localhost:9093/api/v2/alerts' 2>/dev/null | jq -r '.[] | "\(.labels.alertname): \(.status.state)"' | sort | uniq -c | sort -rn

  log-noise:
    desc: Identify top log-producing applications by volume (requires Loki)
    summary: |
      Queries Loki to find which applications are generating the most logs.
      Useful for identifying noisy services that may need log level adjustments
      or filtering. Results show app name and log count over the specified period.

      Examples:
        task kubernetes:log-noise              # Top 20 apps, last 1 hour
        task kubernetes:log-noise -- --top=10  # Top 10 apps
        task kubernetes:log-noise -- --period=24h  # Last 24 hours
    silent: true
    vars:
      TOP: '{{.TOP | default "20"}}'
      PERIOD: '{{.PERIOD | default "1h"}}'
    cmd: |
      echo "=== Top {{.TOP}} Log-Producing Apps (last {{.PERIOD}}) ==="
      echo ""
      kubectl exec -n monitoring deploy/loki-gateway -- \
        wget -qO- "http://localhost:8080/loki/api/v1/query?query=sum(count_over_time({namespace=~\".%2B\"}[{{.PERIOD}}]))%20by%20(app)&limit=100" 2>/dev/null \
        | jq -r '.data.result | sort_by(.value[1] | tonumber) | reverse | .[:{{.TOP}}] | .[] | "\(.metric.app)\t\(.value[1])"' \
        | awk 'BEGIN {printf "%-40s %s\n", "APP", "LOG_COUNT"; printf "%-40s %s\n", "---", "---------"} {printf "%-40s %s\n", $1, $2}'

  test-app:
    desc: Run Mondoo checks for a Kubernetes application
    summary: |
      Runs the migrated application checks with cnspec and local Mondoo
      policy bundles.

      Examples:
        task kubernetes:test-app app=authentication/zitadel
        task kubernetes:test-app app=monitoring/grafana
        task kubernetes:test-app app=home-automation/paperless
        task kubernetes:test-app app=home/mealie
    cmd: >-
      {{.PYTHON_BIN}} {{.MONDOO_SCAN_SCRIPT}}
      {{if .output}}--output {{.output}}{{end}}
      {{if .report_dir}}--report-dir {{.report_dir}}{{end}}
      app --app {{.app}}
    preconditions:
      - msg: "Missing app parameter. Usage: task kubernetes:test-app app=<namespace>/<app>"
        sh: test -n "{{.app}}"
      - { msg: "Missing Python interpreter", sh: "command -v {{.PYTHON_BIN}} >/dev/null" }
      - { msg: "Missing cnspec", sh: "command -v cnspec >/dev/null" }
      - { msg: "Missing Mondoo wrapper", sh: "test -f {{.MONDOO_SCAN_SCRIPT}}" }

  mondoo-manifests:
    desc: Run Mondoo checks against rendered Flux Kubernetes manifests
    summary: |
      Renders Flux output through the local Flux path, runs the repository
      custom Kubernetes policy as a failing gate, and optionally collects
      built-in Mondoo posture output as report-only.

      Examples:
        task kubernetes:mondoo-manifests
        task kubernetes:mondoo-manifests path=./kubernetes output=junit report_dir=mondoo-reports
    vars:
      PATH_ARG: '{{.path | default "./kubernetes"}}'
      INCLUDE_POSTURE: '{{.include_posture | default "true"}}'
    cmd: >-
      {{.PYTHON_BIN}} {{.MONDOO_SCAN_SCRIPT}}
      {{if .output}}--output {{.output}}{{end}}
      {{if .report_dir}}--report-dir {{.report_dir}}{{end}}
      k8s-manifests --path {{.PATH_ARG}}
      {{if eq .INCLUDE_POSTURE "true"}}--include-posture{{end}}
    preconditions:
      - { msg: "Missing Python interpreter", sh: "command -v {{.PYTHON_BIN}} >/dev/null" }
      - { msg: "Missing cnspec", sh: "command -v cnspec >/dev/null" }
      - { msg: "Missing flate", sh: "command -v flate >/dev/null" }
      - { msg: "Missing Mondoo wrapper", sh: "test -f {{.MONDOO_SCAN_SCRIPT}}" }

  mondoo-live:
    desc: Run report-only Mondoo posture scan against the current Kubernetes cluster
    summary: |
      Uses the current kubeconfig and cnspec's built-in Kubernetes posture
      policies. This is intentionally report-only during the migration.

      Examples:
        task kubernetes:mondoo-live
        task kubernetes:mondoo-live output=junit report_dir=mondoo-reports
    cmd: >-
      {{.PYTHON_BIN}} {{.MONDOO_SCAN_SCRIPT}}
      {{if .output}}--output {{.output}}{{end}}
      {{if .report_dir}}--report-dir {{.report_dir}}{{end}}
      k8s-live
    preconditions:
      - { msg: "Missing Python interpreter", sh: "command -v {{.PYTHON_BIN}} >/dev/null" }
      - { msg: "Missing cnspec", sh: "command -v cnspec >/dev/null" }
      - { msg: "Missing Mondoo wrapper", sh: "test -f {{.MONDOO_SCAN_SCRIPT}}" }

  log-noise-by-namespace:
    desc: Identify top log-producing namespaces by volume (requires Loki)
    summary: |
      Queries Loki to find which namespaces are generating the most logs.
      Useful for identifying noisy namespaces that may need investigation.

      Examples:
        task kubernetes:log-noise-by-namespace              # Last 1 hour
        task kubernetes:log-noise-by-namespace -- --period=6h  # Last 6 hours
    silent: true
    vars:
      PERIOD: '{{.PERIOD | default "1h"}}'
    cmd: |
      echo "=== Log Volume by Namespace (last {{.PERIOD}}) ==="
      echo ""
      kubectl exec -n monitoring deploy/loki-gateway -- \
        wget -qO- "http://localhost:8080/loki/api/v1/query?query=sum(count_over_time({namespace=~\".%2B\"}[{{.PERIOD}}]))%20by%20(namespace)&limit=100" 2>/dev/null \
        | jq -r '.data.result | sort_by(.value[1] | tonumber) | reverse | .[] | "\(.metric.namespace)\t\(.value[1])"' \
        | awk 'BEGIN {printf "%-30s %s\n", "NAMESPACE", "LOG_COUNT"; printf "%-30s %s\n", "---------", "---------"} {printf "%-30s %s\n", $1, $2}'
