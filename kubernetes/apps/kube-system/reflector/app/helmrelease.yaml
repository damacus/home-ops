---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: emberstack
spec:
  interval: 1h
  url: oci://ghcr.io/emberstack/helm-charts/reflector
  ref:
    tag: 10.0.60
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: emberstack
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    imagePullSecrets:
      - name: dockerhub-credentials
