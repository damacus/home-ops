---
apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-buckets-create-v3
  namespace: storage
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-04-16T18-13-26Z
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: RUSTFS_ENDPOINT
              value: "http://rustfs.storage.svc.cluster.local:9000"
            - name: BUCKETS
              value: "cnpg-backups loki-data loki-chunks volsync-backups app-data backups cloudnative-pg longhorn"
          envFrom:
            - secretRef:
                name: rustfs-credentials
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "Configuring mc alias and waiting for RustFS at $${RUSTFS_ENDPOINT:?}..."
              i=1
              ready=false
              while [ "$i" -le 60 ]; do
                if mc alias set rustfs "$${RUSTFS_ENDPOINT:?}" "$${RUSTFS_ACCESS_KEY:?}" "$${RUSTFS_SECRET_KEY:?}" >/dev/null 2>&1; then
                  if mc ls rustfs >/dev/null 2>&1; then
                    echo "RustFS is reachable"
                    ready=true
                    break
                  fi
                fi
                echo "Attempt $i: RustFS not ready, retrying..."; sleep 5
                i=$((i + 1))
              done

              if [ "$ready" != "true" ]; then
                echo "RustFS did not become reachable in time"
                exit 1
              fi

              for b in ${BUCKETS}; do
                echo "Creating bucket: $b"
                mc mb --ignore-existing "rustfs/${b}"
              done
