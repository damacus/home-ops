---
# Green CNPG cluster for the zitadel PG16 -> PG18 blue/green migration.
# Applied imperatively during migration; not included in the Flux app kustomization.
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: zitadel-green
  namespace: authentication
spec:
  imagePullSecrets:
    - name: ghcr-credentials
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql
    major: 18
  instances: 2
  primaryUpdateStrategy: unsupervised
  enablePDB: true

  bootstrap:
    initdb:
      database: zitadel
      owner: zitadel
      secret:
        name: zitadel-db

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: zitadel-rustfs-store
        serverName: zitadel-green-20260519b

  monitoring:
    enablePodMonitor: true

  storage:
    size: 10Gi
    storageClass: openebs-hostpath

  enableSuperuserAccess: true
  superuserSecret:
    name: zitadel-db-superuser

  externalClusters:
    - name: zitadel
      connectionParameters:
        host: zitadel-rw.authentication.svc.cluster.local
        user: postgres
        dbname: zitadel
        port: "5432"
        sslmode: prefer
      password:
        name: zitadel-db-superuser
        key: password

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 256MB
      wal_level: logical
      max_replication_slots: "10"
      max_wal_senders: "10"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 1Gi
