---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Flux & Kubeconform"

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - name: Run yamllint
        uses: actionshub/yamllint@main

  kubeconform:
    name: Kubeconform
    needs: yaml-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Setup Workflow Tools
        run: brew install fluxcd/tap/flux kubeconform kustomize

      - name: Run kubeconform
        shell: bash
        run: bash ./scripts/kubeconform.sh ./kubernetes

  mondoo:
    name: Mondoo
    needs: [ yaml-lint, kubeconform, flux-test ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Setup Workflow Tools
        run: |
          brew install kustomize yq
          bash -c "$(curl -sSL https://install.mondoo.com/sh)"
          cnspec version

      - name: Run wrapper unit tests
        run: python3 -m unittest tests/test_mondoo_scan.py

      - name: Validate migrated policy parity
        run: python3 scripts/mondoo_scan.py validate-parity

      - name: Lint Mondoo policies
        run: cnspec policy lint mondoo/policies/*.mql.yaml

      - name: Run rendered manifest scans
        run: >-
          python3 scripts/mondoo_scan.py
          --output junit
          --report-dir mondoo-reports
          k8s-manifests --path ./kubernetes --include-posture

      - name: Upload Mondoo reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mondoo-reports
          path: mondoo-reports
          if-no-files-found: ignore

  rustfs-iam-policy:
    name: RustFS IAM Policy
    needs: yaml-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Setup Workflow Tools
        run: |
          bash -c "$(curl -sSL https://install.mondoo.com/sh)"
          brew tap go-task/tap
          brew install go-task/tap/go-task
          cnspec providers install os

      - name: Run RustFS IAM policy
        run: task k8s:rustfs-iam-policy

  flux-test:
    name: Flux Local Test
    needs: [ yaml-lint, kubeconform, rustfs-iam-policy ]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: "${{ github.event.repository.default_branch }}"
          path: default

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@54e4ba378e155ada619caafdc599e5c4d759ce5c # v2.8.7

      - uses: allenporter/flux-local/action/test@4d666add25002f550dc0dbe8b2b2f25859169b34 # 8.2.0
        id: test
        with:
          path: ./kubernetes
          enable-helm: true
          debug: false
          api-versions: policy/v1/PodDisruptionBudget,monitoring.coreos.com/v1,monitoring.coreos.com/v1/ServiceMonitor,monitoring.coreos.com/v1/PodMonitor,monitoring.coreos.com/v1/PrometheusRule

  flux-diff:
    name: Flux Local Diff
    needs: [ yaml-lint, kubeconform, rustfs-iam-policy ]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    strategy:
      matrix:
        resource: [ "helmrelease", "kustomization" ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: "${{ github.event.repository.default_branch }}"
          path: default

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@54e4ba378e155ada619caafdc599e5c4d759ce5c # v2.8.7

      - uses: allenporter/flux-local/action/diff@4d666add25002f550dc0dbe8b2b2f25859169b34 # 8.2.0
        id: diff
        with:
          live-branch: main
          path: ./kubernetes
          resource: ${{ matrix.resource }}
          debug: false
          api-versions: policy/v1/PodDisruptionBudget,monitoring.coreos.com/v1,monitoring.coreos.com/v1/ServiceMonitor,monitoring.coreos.com/v1/PodMonitor,monitoring.coreos.com/v1/PrometheusRule

      - name: PR Comments (${{matrix.resource}})
        uses: mshick/add-pr-comment@v3
        if: ${{ steps.diff.outputs.diff != '' }}
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          message-failure: Unable to post diff for helmrelease
          message: |
            `````diff
            ${{ steps.diff.outputs.diff }}
            `

  flux-diff-success:
    if: ${{ always() }}
    needs: [ "flux-diff", "flux-test", "mondoo" ]
    name: Flux Local Successful
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result,
          'cancelled') }}
        name: Check matrix status
        run: exit 1
