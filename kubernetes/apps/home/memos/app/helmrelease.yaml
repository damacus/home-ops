---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memos
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      memos:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: neosmemo/memos
              tag: stable
            env:
              MEMOS_DATA: &datadir /var/opt/memos
              MEMOS_DRIVER: sqlite
              MEMOS_INSTANCE_URL: https://notes.ironstone.casa
              MEMOS_PORT: "5230"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 5230
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 5230
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              runAsNonRoot: true
              runAsUser: 10001
              runAsGroup: 10001
              seccompProfile: { type: RuntimeDefault }
        pod:
          securityContext:
            fsGroup: 10001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: memos
        ports:
          http:
            port: 5230

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "traefik-int.ironstone.casa"
        parentRefs:
          - name: traefik-internal
            namespace: network
            sectionName: websecure
        hostnames: ["notes.ironstone.casa"]
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - kind: Service
                name: memos
                namespace: home
                port: 5230
                weight: 1

    persistence:
      data:
        existingClaim: memos-data
        globalMounts:
          - path: *datadir
