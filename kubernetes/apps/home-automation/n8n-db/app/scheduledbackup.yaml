---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-green
  namespace: home-automation
spec:
  schedule: "0 25 0 * * *"
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      objectStore: n8n-rustfs-store
  cluster:
    name: n8n-green
