---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: mealie-green
  namespace: home
spec:
  schedule: "0 20 3 * * *"
  immediate: true
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      objectStore: mealie-rustfs-store
  cluster:
    name: mealie-green
