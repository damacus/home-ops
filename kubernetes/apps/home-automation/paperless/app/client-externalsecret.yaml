---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-client
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: paperless-client
    template:
      data:
        client-id: "paperless"
        client-secret: "{{ .client_secret }}"
  dataFrom:
    - extract:
        key: zitadel-paperless-oidc
