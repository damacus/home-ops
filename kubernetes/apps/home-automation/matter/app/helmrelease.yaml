---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app matter-server
spec:
  interval: 15m
  maxHistory: 3
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: uninstall
  uninstall:
    keepHistory: false

  values:
    global:
      nameOverride: *app
      fullnameOverride: *app

    controllers:
      matter-server:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          fix-data-permissions:
            image:
              repository: busybox
              tag: 1.38.0
            command: ["/bin/sh", "-c"]
            args:
              - chown -R 1000:1000 /data
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN"]
              runAsGroup: 0
              runAsNonRoot: false
              runAsUser: 0
              seccompProfile: { type: RuntimeDefault }
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"

        containers:
          app:
            image:
              repository: ghcr.io/matter-js/matterjs-server
              tag: 1.3.1@sha256:4933a93ab96f361708af785a2f8c77c6b7e8f890f0464a73c970d782e4528827
              pullPolicy: IfNotPresent
            env:
              TZ: "Europe/London"
              PORT: "5580"
              STORAGE_PATH: /data
              LOG_LEVEL: info
              PRODUCTION_MODE: "true"
              NODE_OPTIONS: "--max-old-space-size=384"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "1000m"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

    # Matter discovers devices using MDNS and neighbors discovery,
    # thus we need the controller to be on the host network.
    # https://github.com/matter-js/matterjs-server/blob/main/docs/docker.md
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-credentials
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

    service:
      app:
        controller: *app
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        annotations:
          io.cilium/lb-ipam-ips: "192.168.1.234"
        ports:
          api:
            enabled: true
            primary: true
            protocol: TCP
            port: &port 5580
          mdns-tcp:
            enabled: true
            port: 5353
            protocol: TCP
            targetPort: 5353
          mdns-udp:
            enabled: true
            port: 5353
            protocol: UDP
            targetPort: 5353

    persistence:
      data:
        existingClaim: matter-server-data
        globalMounts:
          - path: /data
