---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo
  namespace: flux-system
spec:
  targetNamespace: dev
  path: ./kubernetes/apps/dev/forgejo/app
  prune: true
  dependsOn:
    - name: external-secrets-stores
    - name: forgejo-db
    - name: traefik
    - name: zitadel
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
