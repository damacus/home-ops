---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: med-tracker-minio-store
  namespace: home
spec:
  retentionPolicy: 30d
  configuration:
    destinationPath: s3://cnpg-backups/med-tracker
    endpointURL: http://minio.storage.svc.cluster.local:9000
    s3Credentials:
      accessKeyId:
        name: minio-cnpg-med-tracker
        key: aws-access-key-id
      secretAccessKey:
        name: minio-cnpg-med-tracker
        key: aws-secret-access-key
    data:
      compression: bzip2
    wal:
      compression: bzip2
      maxParallel: 2
