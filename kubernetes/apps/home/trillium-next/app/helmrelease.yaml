---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trillium-next
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      trillium:
        containers:
          app:
            image:
              repository: ghcr.io/triliumnext/notes
              tag: develop
            env:
              TRILIUM_DATA_DIR: &datadir /home/node/trilium-data
              TRILIUM_GENERAL_NOAUTHENTICATION: "true"
              USER_UID: "1000"
              USER_GID: "1000"
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 500Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
              runAsGroup: 0
              runAsNonRoot: false
              runAsUser: 0
              seccompProfile: { type: RuntimeDefault }
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: trillium
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "traefik-int.ironstone.casa"
        parentRefs:
          - name: traefik-internal
            namespace: network
            sectionName: websecure
        hostnames: ["notes.ironstone.casa"]
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: oauth2-proxy-forward-auth
            backendRefs:
              - kind: Service
                name: trillium-next
                namespace: home
                port: 8080
                weight: 1

    persistence:
      data:
        existingClaim: trillium-data
        globalMounts:
          - path: *datadir
