---
# CNPG Publication CR — declares a PostgreSQL logical-replication publication
# on the blue cluster that exposes all tables in the n8n application database. The CNPG
# operator reconciles this into a real PostgreSQL PUBLICATION named
# `n8n_green_pub` on the blue primary.
#
# Applied by `task postgres:publication`. Removed at cleanup.
apiVersion: postgresql.cnpg.io/v1
kind: Publication
metadata:
  name: n8n-green-pub
  namespace: home-automation
spec:
  cluster:
    name: n8n
  dbname: app
  name: n8n_green_pub
  publicationReclaimPolicy: delete
  target:
    allTables: true
