---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      n8n:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: &image n8nio/n8n
              tag: &tag 2.29.2@sha256:1357982c594730263f0dedf9e1770075b78cac9417775d30531a3c00a72b2a58
            env: &env
              DB_TYPE: "postgresdb"
              # Blue/green cutover is a single edit: change the anchor target
              # below from n8n-app (blue) to n8n-green-app (green). All four
              # DB env vars resolve through it.
              DB_POSTGRESDB_DATABASE:
                valueFrom:
                  secretKeyRef:
                    name: &dbSecret n8n-green-app
                    key: dbname
              DB_POSTGRESDB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: *dbSecret
                    key: host
              DB_POSTGRESDB_PORT: 5432
              DB_POSTGRESDB_USER:
                valueFrom:
                  secretKeyRef:
                    name: *dbSecret
                    key: user
              DB_POSTGRESDB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *dbSecret
                    key: password
              EXECUTIONS_DATA_MAX_AGE: 7
              EXECUTIONS_DATA_PRUNE: "true"
              EXECUTIONS_DATA_PRUNE_MAX_COUNT: 50000
              EXECUTIONS_MODE: "queue"
              GENERIC_TIMEZONE: "Europe/London"
              N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
              N8N_GIT_NODE_DISABLE_BARE_REPOS: "true"
              N8N_COMMUNITY_PACKAGES_ENABLED: "false"
              # N8N_DEFAULT_LOCALE: "en_GB" https://community.n8n.io/t/unable-to-input-credentials/192826/7
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
              N8N_ENCRYPTION_KEY:
                valueFrom:
                  secretKeyRef:
                    name: n8n-secret
                    key: encryption_key
              N8N_EDITOR_BASE_URL: "https://n8n.damacus.io"
              N8N_HOST: "n8n.damacus.io"
              N8N_LOG_LEVEL: "info"
              N8N_LOG_OUTPUT: "console"
              N8N_PORT: &port 5678
              N8N_PROTOCOL: "https"
              N8N_TEMPLATES_ENABLED: "false"
              N8N_RUNNERS_ENABLED: "true"
              WEBHOOK_URL: &webhooks "https://n8n-webhooks.damacus.io"
              N8N_PROXY_HOPS: "1"
              OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
              NODE_ENV: "production"
              QUEUE_BULL_REDIS_HOST: "redis-master.database.svc.cluster.local"
              QUEUE_BULL_REDIS_PORT: 6379
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            probes:
              liveness: &probes
                enabled: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 2Gi
        pod:
          securityContext: &podSecurityContext
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
            seccompProfile: { type: RuntimeDefault }

      worker:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: *image
              tag: *tag
            command: ["n8n"]
            args: ["worker", "--concurrency=5"]
            env: *env
            securityContext: *securityContext
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 2Gi
        pod:
          securityContext: *podSecurityContext

    service:
      app:
        controller: n8n
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "traefik-ext.damacus.io"
        hostnames:
          - "n8n.damacus.io"
        parentRefs:
          - name: traefik-internal
            namespace: network
            sectionName: websecure
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: oauth2-proxy-damacus-forward-auth
            matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - kind: Service
                name: n8n
                port: 5678
      webhooks:
        annotations:
          external-dns.alpha.kubernetes.io/target: "traefik-ext.damacus.io"
        hostnames:
          - "n8n-webhooks.damacus.io"
        parentRefs:
          - name: traefik-internal
            namespace: network
            sectionName: websecure
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /webhook
              - path:
                  type: PathPrefix
                  value: /webhook-test
              - path:
                  type: PathPrefix
                  value: /webhook-waiting
              - path:
                  type: PathPrefix
                  value: /mcp-server
            backendRefs:
              - kind: Service
                name: n8n
                port: 5678

    persistence:
      data:
        existingClaim: n8n
        advancedMounts:
          n8n:
            app:
              - path: /home/node/.n8n
