---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# Frontend egress: DNS resolution + backend API proxy + MCP proxy
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: penpot-frontend-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: frontend
      app.kubernetes.io/instance: penpot
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:app.kubernetes.io/controller: backend
            k8s:app.kubernetes.io/instance: penpot
      toPorts:
        - ports:
            - port: "6060"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:app.kubernetes.io/controller: mcp
            k8s:app.kubernetes.io/instance: penpot
      toPorts:
        - ports:
            - port: "4401"
              protocol: TCP
            - port: "4402"
              protocol: TCP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# MCP egress: DNS + npm registry for startup-time corepack/npx package downloads
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: penpot-mcp-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: mcp
      app.kubernetes.io/instance: penpot
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: registry.npmjs.org
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# Backend egress: DNS + PostgreSQL + Redis + exporter
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: penpot-backend-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: backend
      app.kubernetes.io/instance: penpot
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:cnpg.io/cluster: penpot
            k8s:cnpg.io/podRole: instance
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: database
            k8s:app.kubernetes.io/component: master
            k8s:app.kubernetes.io/instance: redis
            k8s:app.kubernetes.io/name: redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    - toFQDNs:
        - matchName: zitadel.damacus.io
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:app.kubernetes.io/controller: exporter
            k8s:app.kubernetes.io/instance: penpot
      toPorts:
        - ports:
            - port: "6061"
              protocol: TCP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# Migration job egress: DNS + penpot-db only
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: penpot-skip-onboarding-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: penpot-skip-onboarding
      app.kubernetes.io/instance: penpot
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:cnpg.io/cluster: penpot
            k8s:cnpg.io/podRole: instance
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# Exporter egress: DNS + frontend (headless Chromium loads pages from frontend) + Redis
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: penpot-exporter-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: exporter
      app.kubernetes.io/instance: penpot
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:app.kubernetes.io/controller: frontend
            k8s:app.kubernetes.io/instance: penpot
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: database
            k8s:app.kubernetes.io/component: master
            k8s:app.kubernetes.io/instance: redis
            k8s:app.kubernetes.io/name: redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
