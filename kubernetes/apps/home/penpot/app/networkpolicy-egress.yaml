---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# Frontend egress: DNS resolution + backend API proxy
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: penpot-frontend-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: frontend
      app.kubernetes.io/instance: penpot
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:app.kubernetes.io/controller: backend
            k8s:app.kubernetes.io/instance: penpot
      toPorts:
        - ports:
            - port: "6060"
              protocol: TCP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# Backend egress: DNS + PostgreSQL + Redis + exporter
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: penpot-backend-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: backend
      app.kubernetes.io/instance: penpot
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:cnpg.io/cluster: penpot
            k8s:cnpg.io/podRole: instance
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: database
            k8s:app.kubernetes.io/component: master
            k8s:app.kubernetes.io/instance: redis
            k8s:app.kubernetes.io/name: redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:app.kubernetes.io/controller: exporter
            k8s:app.kubernetes.io/instance: penpot
      toPorts:
        - ports:
            - port: "6061"
              protocol: TCP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# Exporter egress: DNS + frontend (headless Chromium loads pages from frontend)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: penpot-exporter-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: exporter
      app.kubernetes.io/instance: penpot
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: home
            k8s:app.kubernetes.io/controller: frontend
            k8s:app.kubernetes.io/instance: penpot
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
