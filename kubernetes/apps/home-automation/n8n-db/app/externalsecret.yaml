---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
# n8n-app secret — app-role credentials for the blue cluster.
#
# Shape matches CNPG's auto-generated <cluster>-app secret (host, username,
# password, dbname, port, uri) so the same wiring in the n8n HelmRelease
# resolves against either this secret (blue) or the CNPG-managed
# n8n-green-app (green) after cutover. All four DB_POSTGRESDB_* env vars
# read keys from whichever secret the helmrelease anchor points at.
#
# Source: 1Password entry `n8n-app` with at least a `password` property
# holding the application role password. If the 1Password entry uses a
# different field name, adjust the template binding below.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-app
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: n8n-app
    template:
      engineVersion: v2
      data:
        host: "n8n-rw.home-automation.svc.cluster.local"
        port: "5432"
        dbname: "n8n"
        username: "n8n"
        password: "{{ .password }}"
        uri: "postgresql://n8n:{{ .password }}@n8n-rw.home-automation.svc.cluster.local:5432/n8n"
  dataFrom:
    - extract:
        key: n8n-app
