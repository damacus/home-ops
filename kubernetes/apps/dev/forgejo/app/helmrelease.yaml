---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 30m
  chart:
    spec:
      chart: forgejo
      version: "16.0.2"
      sourceRef:
        kind: HelmRepository
        name: forgejo-helm
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    # Disable bundled databases
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: false

    podAnnotations:
      reloader.stakater.com/auto: "true"

    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000

    persistence:
      enabled: true
      create: false
      claimName: forgejo

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: LoadBalancer
        port: 22
        loadBalancerIP: 192.168.1.236
        annotations:
          external-dns.alpha.kubernetes.io/hostname: ssh.forgejo.ironstone.casa

    ingress:
      enabled: false

    gitea:
      admin:
        existingSecret: forgejo-admin
      oauth:
        - name: zitadel
          provider: openidConnect
          existingSecret: forgejo-zitadel-oidc
          autoDiscoverUrl: "https://zitadel.damacus.io/.well-known/openid-configuration"
          scopes: "openid,email,profile,groups"

      config:
        APP_NAME: "Forgejo"
        RUN_MODE: prod

        server:
          DOMAIN: forgejo.ironstone.casa
          ROOT_URL: "https://forgejo.ironstone.casa"
          HTTP_PORT: 3000
          SSH_DOMAIN: ssh.forgejo.ironstone.casa
          SSH_PORT: 22
          DISABLE_SSH: "false"
          LFS_START_SERVER: "true"

        database:
          DB_TYPE: postgres
          HOST: forgejo-rw.dev.svc.cluster.local:5432
          NAME: forgejo
          USER: forgejo
          PASSWD: ""
          SSL_MODE: disable

        cache:
          ADAPTER: memory

        session:
          PROVIDER: db

        queue:
          TYPE: level

        security:
          INSTALL_LOCK: "true"

        oauth2_client:
          ENABLE_AUTO_REGISTRATION: "true"
          OPENID_CONNECT_SCOPES: "profile email groups"
          UPDATE_AVATAR: "true"

        service:
          DISABLE_REGISTRATION: "false"
          ALLOW_ONLY_EXTERNAL_REGISTRATION: "true"
          REQUIRE_SIGNIN_VIEW: "false"
          SHOW_REGISTRATION_BUTTON: "false"

        log:
          MODE: console
          LEVEL: info

      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-db
              key: password
