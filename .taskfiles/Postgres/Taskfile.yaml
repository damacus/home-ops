---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

# Operator-facing SOP for CNPG blue/green major-version PostgreSQL upgrades.
# All tasks shell out to scripts/pg-bluegreen.sh; each subcommand is
# idempotent and can be re-run safely.
#
# Prefer PG_PROFILE=<app> for service-specific migrations. Profiles live in
# .taskfiles/Postgres/profiles/*.env and define app deployments, DB names,
# Helm cutover paths, manifest directories, and health checks.

vars:
  SCRIPT: "{{.ROOT_DIR}}/scripts/pg-bluegreen.sh"
  PG_PROFILE: '{{.PG_PROFILE | default ""}}'
  NAMESPACE: '{{.NAMESPACE | default "home-automation"}}'
  APP_DEPLOYMENTS: '{{.APP_DEPLOYMENTS | default "n8n n8n-worker"}}'
  HELMRELEASE: '{{.HELMRELEASE | default "n8n"}}'
  BLUE_CLUSTER: '{{.BLUE_CLUSTER | default "n8n"}}'
  GREEN_CLUSTER: '{{.GREEN_CLUSTER | default "n8n-green"}}'
  BLUE_DATABASE: '{{.BLUE_DATABASE | default "app"}}'
  GREEN_DATABASE: '{{.GREEN_DATABASE | default "app"}}'
  BLUE_USER: '{{.BLUE_USER | default "app"}}'
  GREEN_USER: '{{.GREEN_USER | default "app"}}'
  BLUE_APP_SECRET: '{{.BLUE_APP_SECRET | default "n8n-app"}}'
  GREEN_APP_SECRET: '{{.GREEN_APP_SECRET | default "n8n-green-app"}}'
  PUBLICATION_NAME: '{{.PUBLICATION_NAME | default "n8n-green-pub"}}'
  SUBSCRIPTION_NAME: '{{.SUBSCRIPTION_NAME | default "n8n-green-sub"}}'
  STATE_DIR: '{{.STATE_DIR | default ".migration-state/n8n"}}'
  MIGRATION_MANIFEST_DIR: '{{.MIGRATION_MANIFEST_DIR | default ""}}'
  HELMRELEASE_PATH: '{{.HELMRELEASE_PATH | default ""}}'
  PROMETHEUS_URL: '{{.PROMETHEUS_URL | default "http://prometheus-operated.observability.svc.cluster.local:9090"}}'
  CONFIRM_CONTEXT: '{{.CONFIRM_CONTEXT | default "false"}}'

env:
  PG_PROFILE: "{{.PG_PROFILE}}"
  NAMESPACE: "{{.NAMESPACE}}"
  APP_DEPLOYMENTS: "{{.APP_DEPLOYMENTS}}"
  HELMRELEASE: "{{.HELMRELEASE}}"
  BLUE_CLUSTER: "{{.BLUE_CLUSTER}}"
  GREEN_CLUSTER: "{{.GREEN_CLUSTER}}"
  BLUE_DATABASE: "{{.BLUE_DATABASE}}"
  GREEN_DATABASE: "{{.GREEN_DATABASE}}"
  BLUE_USER: "{{.BLUE_USER}}"
  GREEN_USER: "{{.GREEN_USER}}"
  BLUE_APP_SECRET: "{{.BLUE_APP_SECRET}}"
  GREEN_APP_SECRET: "{{.GREEN_APP_SECRET}}"
  PUBLICATION_NAME: "{{.PUBLICATION_NAME}}"
  SUBSCRIPTION_NAME: "{{.SUBSCRIPTION_NAME}}"
  STATE_DIR: "{{.STATE_DIR}}"
  MIGRATION_MANIFEST_DIR: "{{.MIGRATION_MANIFEST_DIR}}"
  HELMRELEASE_PATH: "{{.HELMRELEASE_PATH}}"
  PROMETHEUS_URL: "{{.PROMETHEUS_URL}}"
  CONFIRM_CONTEXT: "{{.CONFIRM_CONTEXT}}"
  ROOT_DIR: "{{.ROOT_DIR}}"

tasks:
  default:
    desc: "Show the blue/green migration SOP"
    cmds:
      - task: sop

  sop:
    desc: "Print the operator runbook"
    silent: true
    cmds:
      - |
        cat <<'EOF'
        CNPG PG16 -> PG18 blue/green SOP
          0. Pick an explicit profile: PG_PROFILE=<app>
          1. Land prerequisite manifests/settings for logical replication.
          2. task postgres:discover PG_PROFILE=<app>
          3. task postgres:prepare-blue PG_PROFILE=<app>         # no-op unless the profile declares DB prerequisites
          4. task postgres:preflight PG_PROFILE=<app>
          5. task postgres:all-but-cutover PG_PROFILE=<app>
          6. task postgres:monitor PG_PROFILE=<app>             # repeat until ready
          7. Freeze app writes/deployments
          8. task postgres:ready PG_PROFILE=<app>
          9. task postgres:cutover PG_PROFILE=<app>             # stops writes, validates, waits
         10.   operator: commit + push the HelmRelease cutover edit and reconcile Flux
         11.   script resumes, restores replicas, runs postcheck + grafana-postcheck
         12. Soak (24-48h)
         13. task postgres:cleanup PG_PROFILE=<app>
        EOF

  discover:
    desc: "Snapshot current CNPG/app/db state"
    cmds:
      - "{{.SCRIPT}} discover"

  show-active:
    desc: "Print which DB target the HelmRelease currently points at"
    cmds:
      - "{{.SCRIPT}} show-active"

  preflight:
    desc: "Validate prerequisites before standing up green"
    cmds:
      - "{{.SCRIPT}} preflight"

  blue-connection:
    desc: "Print the blue cluster connection URI (reads {{.BLUE_APP_SECRET}})"
    cmds:
      - "{{.SCRIPT}} blue-connection"

  green-connection:
    desc: "Print the green cluster connection URI (reads {{.GREEN_APP_SECRET}})"
    cmds:
      - "{{.SCRIPT}} green-connection"

  prepare-blue:
    desc: "Apply profile-declared blue DB prerequisites"
    cmds:
      - "{{.SCRIPT}} prepare-blue"

  create-green:
    desc: "Apply the green CNPG cluster manifest and wait for healthy"
    cmds:
      - "{{.SCRIPT}} create-green"

  copy-schema:
    desc: "Schema-only pg_dump from blue piped into psql on green"
    cmds:
      - "{{.SCRIPT}} copy-schema"

  publication:
    desc: "Apply the CNPG Publication CR against blue"
    cmds:
      - "{{.SCRIPT}} publication"

  subscription:
    desc: "Apply the CNPG Subscription CR against green"
    cmds:
      - "{{.SCRIPT}} subscription"

  subscription-reset:
    desc: "Delete/recreate the CNPG Subscription CR against green"
    cmds:
      - "{{.SCRIPT}} subscription-reset"

  monitor:
    desc: "Print pub/sub status + replication lag (one-shot)"
    cmds:
      - "{{.SCRIPT}} monitor"

  ready:
    desc: "Exit 0 only when green is caught up and safe to cut over"
    cmds:
      - "{{.SCRIPT}} ready"

  cutover:
    desc: "Stop blue writes, sync sequences, hand off to operator for the HelmRelease edit"
    cmds:
      - "{{.SCRIPT}} cutover"

  postcheck:
    desc: "Run automated post-cutover validation"
    cmds:
      - "{{.SCRIPT}} postcheck"

  grafana-postcheck:
    desc: "Run Prometheus/Loki/MCP post-cutover checks"
    cmds:
      - "{{.SCRIPT}} grafana-postcheck"

  rollback:
    desc: "Revert to blue (git revert + flux reconcile)"
    cmds:
      - "{{.SCRIPT}} rollback"

  cleanup:
    desc: "After soak: drop pub/sub, delete blue cluster, clear runtime state"
    cmds:
      - "{{.SCRIPT}} cleanup"

  all-but-cutover:
    desc: "discover -> prepare-blue -> preflight -> create-green -> copy-schema -> publication -> subscription -> monitor"
    cmds:
      - task: discover
      - task: prepare-blue
      - task: preflight
      - task: create-green
      - task: copy-schema
      - task: publication
      - task: subscription
      - task: monitor
