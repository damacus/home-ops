---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: med-tracker-secret
  namespace: home
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: med-tracker-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SECRET_KEY_BASE: "{{ .SECRET_KEY_BASE }}"
        DATABASE_URL: "postgresql://med-tracker:{{ .db_password }}@med-tracker-rw.home.svc.cluster.local:5432/med-tracker"
        SOLID_CACHE_DATABASE_URL: "postgresql://med-tracker:{{ .db_password }}@med-tracker-rw.home.svc.cluster.local:5432/medtracker_production_cache"
        SOLID_QUEUE_DATABASE_URL: "postgresql://med-tracker:{{ .db_password }}@med-tracker-rw.home.svc.cluster.local:5432/medtracker_production_queue"
        SOLID_CABLE_DATABASE_URL: "postgresql://med-tracker:{{ .db_password }}@med-tracker-rw.home.svc.cluster.local:5432/medtracker_production_cable"
        ADMIN_EMAIL: "{{ .ADMIN_EMAIL }}"
        ADMIN_PASSWORD: "{{ .ADMIN_PASSWORD }}"
        ADMIN_NAME: "{{ .ADMIN_NAME }}"
        ADMIN_DOB: "{{ .ADMIN_DOB }}"
  data:
    - secretKey: SECRET_KEY_BASE
      remoteRef:
        key: med-tracker
        property: SECRET_KEY_BASE
    - secretKey: db_password
      remoteRef:
        key: med-tracker-db
        property: password
    - secretKey: ADMIN_EMAIL
      remoteRef:
        key: med-tracker
        property: ADMIN_EMAIL
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: med-tracker
        property: ADMIN_PASSWORD
    - secretKey: ADMIN_NAME
      remoteRef:
        key: med-tracker
        property: ADMIN_NAME
    - secretKey: ADMIN_DOB
      remoteRef:
        key: med-tracker
        property: ADMIN_DOB
