---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"
silent: true

vars:
  PROVISIONING_DIR: "provisioning"
  ARMBIAN_DIR: "{{.PROVISIONING_DIR}}/armbian-build"
  MONDOO_SCAN_SCRIPT: "{{.SCRIPTS_DIR}}/mondoo_scan.py"

tasks:
  build:
    desc: Build Armbian image for Rock 5B+
    dir: "{{.ARMBIAN_DIR}}"
    cmds:
      - |
        echo "Building Armbian image for Rock 5B+..."
        ./build.sh
        echo ""
        echo "Build complete. Image is in:"
        ls -lh armbian-build-repo/output/images/*.img 2>/dev/null || echo "  (check armbian-build-repo/output/images/)"
        echo ""
        echo "SHA256 of image:"
        bat -p armbian-build-repo/output/images/*.img.sha
        echo ""

  copy:
    desc: Copy built image to ~/Downloads for flashing
    dir: "{{.ARMBIAN_DIR}}"
    cmds:
      - |
        LATEST=$(ls -t armbian-build-repo/output/images/*.img 2>/dev/null | head -1)
        if [ -z "$LATEST" ]; then
          echo "Error: No image found in armbian-build-repo/output/images/"
          exit 1
        fi
        FILENAME=$(basename "$LATEST")
        echo "Copying: $FILENAME to ~/Downloads/"
        cp "$LATEST" ~/Downloads/
        echo "Done. Image ready at ~/Downloads/$FILENAME"

  build-and-copy:
    desc: Build image and copy to ~/Downloads
    cmds:
      - task: build
      - task: copy

  clean:
    desc: Remove build artifacts to free disk space
    dir: "{{.ARMBIAN_DIR}}"
    cmds:
      - |
        echo "Cleaning Armbian build artifacts..."
        rm -rf armbian-build-repo/output/images/*.img
        rm -rf armbian-build-repo/output/images/*.img.xz
        rm -rf armbian-build-repo/output/images/*.img.sha
        rm -rf armbian-build-repo/.tmp
        echo "Done."

  audit:
    desc: Run Mondoo checks against a running node
    requires:
      vars: [host]
    preconditions:
      - { msg: "Missing Python interpreter", sh: "command -v {{.PYTHON_BIN}} >/dev/null" }
      - { msg: "Missing cnspec", sh: "command -v cnspec >/dev/null" }
      - { msg: "Missing Mondoo wrapper", sh: "test -f {{.MONDOO_SCAN_SCRIPT}}" }
    cmds:
      - >-
        {{.PYTHON_BIN}} {{.MONDOO_SCAN_SCRIPT}}
        {{if .output}}--output {{.output}}{{end}}
        {{if .report_dir}}--report-dir {{.report_dir}}{{end}}
        node --host {{.host}}

  audit-image:
    desc: Run Mondoo checks against a mounted image
    requires:
      vars: [mount]
    preconditions:
      - { msg: "Missing Python interpreter", sh: "command -v {{.PYTHON_BIN}} >/dev/null" }
      - { msg: "Missing cnspec", sh: "command -v cnspec >/dev/null" }
      - { msg: "Missing Mondoo wrapper", sh: "test -f {{.MONDOO_SCAN_SCRIPT}}" }
      - { msg: "Mounted image root does not exist: {{.mount}}", sh: "test -d {{.mount}}" }
    cmds:
      - >-
        {{.PYTHON_BIN}} {{.MONDOO_SCAN_SCRIPT}}
        {{if .output}}--output {{.output}}{{end}}
        {{if .report_dir}}--report-dir {{.report_dir}}{{end}}
        image --mount {{.mount}}
