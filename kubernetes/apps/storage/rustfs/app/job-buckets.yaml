---
apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-buckets-create-v3
  namespace: storage
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rc
          image: rustfs/rc:v0.1.16
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: RUSTFS_ENDPOINT
              value: "http://rustfs.storage.svc.cluster.local:9000"
            - name: BUCKETS
              value: "cnpg-backups loki-data loki-chunks volsync-backups app-data backups cloudnative-pg longhorn"
            - name: HOME
              value: /tmp
          envFrom:
            - secretRef:
                name: rustfs-credentials
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "Configuring rc alias and waiting for RustFS at $${RUSTFS_ENDPOINT:?}..."
              i=1
              ready=false
              while [ "$i" -le 60 ]; do
                if rc alias set rustfs "$${RUSTFS_ENDPOINT:?}" "$${RUSTFS_ACCESS_KEY:?}" "$${RUSTFS_SECRET_KEY:?}" >/dev/null 2>&1; then
                  if rc bucket list rustfs/ >/dev/null 2>&1; then
                    echo "RustFS is reachable"
                    ready=true
                    break
                  fi
                fi
                echo "Attempt $i: RustFS not ready, retrying..."; sleep 5
                i=$((i + 1))
              done

              if [ "$ready" != "true" ]; then
                echo "RustFS did not become reachable in time"
                exit 1
              fi

              for b in ${BUCKETS}; do
                echo "Creating bucket: $b"
                rc bucket create --ignore-existing "rustfs/${b}"
              done
      volumes:
        - name: tmp
          emptyDir: {}
