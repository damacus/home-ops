---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: authentication
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      oauth2-proxy:
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/oauth2-proxy/oauth2-proxy
              tag: v7.15.3
            envFrom:
              - secretRef:
                  name: oauth2-proxy
            args:
              - --http-address=0.0.0.0:4180
              - --provider=oidc
              - --oidc-issuer-url=https://zitadel.damacus.io
              - --redirect-url=https://auth.ironstone.casa/oauth2/callback
              - --email-domain=*
              - --scope=openid profile email groups
              - --cookie-domain=.ironstone.casa
              - --whitelist-domain=.ironstone.casa
              - --cookie-secure=true
              - --cookie-samesite=lax
              - --cookie-refresh=1h
              - --cookie-expire=8h
              - --cookie-csrf-per-request=true
              - --cookie-csrf-expire=5m
              - --reverse-proxy=true
              - --set-xauthrequest=true
              - --set-authorization-header=true
              - --pass-access-token=true
              - --pass-authorization-header=true
              - --skip-provider-button=true
              - --upstream=static://202
              - --standard-logging=true
              - --request-logging=true
              - --auth-logging=true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 4180
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
        pod:
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            runAsNonRoot: true
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }

      oauth2-proxy-damacus:
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/oauth2-proxy/oauth2-proxy
              tag: v7.15.3
            envFrom:
              - secretRef:
                  name: oauth2-proxy
            args:
              - --http-address=0.0.0.0:4180
              - --provider=oidc
              - --oidc-issuer-url=https://zitadel.damacus.io
              - --redirect-url=https://auth.damacus.io/oauth2/callback
              - --email-domain=*
              - --scope=openid profile email groups
              - --cookie-domain=.damacus.io
              - --whitelist-domain=.damacus.io
              - --cookie-secure=true
              - --cookie-samesite=lax
              - --cookie-refresh=1h
              - --cookie-expire=8h
              - --cookie-csrf-per-request=true
              - --cookie-csrf-expire=5m
              - --reverse-proxy=true
              - --set-xauthrequest=true
              - --set-authorization-header=true
              - --pass-access-token=true
              - --pass-authorization-header=true
              - --skip-provider-button=true
              - --upstream=static://202
              - --standard-logging=true
              - --request-logging=true
              - --auth-logging=true
            probes:
              liveness: *probes
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
        pod:
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            runAsNonRoot: true
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: oauth2-proxy
        ports:
          http:
            port: *port
      damacus:
        controller: oauth2-proxy-damacus
        ports:
          http:
            port: *port
